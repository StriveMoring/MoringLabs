        /* 1. 核心修复：单纯锁死视口宽度 */
        html, body {

            width: 100vw;
            max-width: 100%;
        }
        
        /* 2. 视觉渲染：把背景色和字体交还给 body */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; 
            background-color: #fbfbfd; 
            color: #1d1d1f;
        }

        }

        .ambient-glow {
            position: absolute; 
            width: 1200px; 
            height: 1200px;
            background: radial-gradient(circle, rgba(64,156,255,0.08) 0%, rgba(255,255,255,0) 70%);
            top: -300px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: -1; 
            pointer-events: none;
        }

        .app-card {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.04);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
        }
        .app-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(0,0,0,0.08);
        }

        .app-card.upcoming {
            background: #fafafa;
            border: 1px solid rgba(0,0,0,0.03);
            cursor: default;
        }
        .app-card.upcoming:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
        }
        
        .icon-shadow { box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1); }
        .icon-upcoming { filter: saturate(80%) opacity(0.95); }
        .model-card:hover { transform: translateY(-4px); }
        
        /* 动画类 */
        @keyframes fade-in-up { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes tab-fade { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .tab-content-active { animation: tab-fade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; display: block; }

        function updateUI(lang) {
            const data = TRANSLATIONS[lang] || TRANSLATIONS['en'];
            
            document.getElementById('hero-title').innerHTML = data.heroTitle;
            document.getElementById('hero-desc').innerText = data.heroDesc;
            
            document.getElementById('tab-apps-text').innerText = data.tabApps;
            document.getElementById('tab-models-text').innerText = data.tabModels;
            
            document.getElementById('pdf-desc').innerText = data.pdfDesc;
            document.getElementById('pdf-learn').innerText = data.pdfLearn;
            
            document.getElementById('submitter-desc').innerText = data.submitterDesc;
            document.getElementById('tag-coming-1').innerText = data.tagComing;
            document.getElementById('btn-coming-1').innerText = data.btnComing;
            
            document.getElementById('rocket-desc').innerText = data.rocketDesc;
            document.getElementById('tag-coming-2').innerText = data.tagComing;
            document.getElementById('btn-coming-2').innerText = data.btnComing;
            
            document.getElementById('new-proj-title').innerText = data.newProjTitle;
            document.getElementById('new-proj-desc').innerText = data.newProjDesc;
            
            document.getElementById('models-section-title').innerText = data.modelsTitle;
            document.getElementById('hf-link-text').innerText = data.hfLinkText;

            document.getElementById('contact-us').innerText = data.contact;
        }

        function switchLang(lang) {
            localStorage.setItem('moring_lang', lang);
            updateUI(lang);
        }

        function detectLanguage() {
            const savedLang = localStorage.getItem('moring_lang');
            if (savedLang && TRANSLATIONS[savedLang]) return savedLang;

            const browserLang = navigator.language || navigator.userLanguage;
            if (browserLang.startsWith('zh')) {
                return (browserLang.includes('CN') || browserLang.includes('Hans')) ? 'zh-CN' : 'zh-TW';
            }
            if (browserLang.startsWith('ja')) return 'ja';
            if (browserLang.startsWith('ko')) return 'ko';
            if (browserLang.startsWith('de')) return 'de';
            if (browserLang.startsWith('fr')) return 'fr';
            if (browserLang.startsWith('es')) return 'es';
            if (browserLang.startsWith('it')) return 'it';
            if (browserLang.startsWith('pt')) return 'pt';
            if (browserLang.startsWith('ru')) return 'ru';
            return 'en';
        }

        // 切换 Tab 逻辑
        function switchTab(tabId) {
            const btnApps = document.getElementById('btn-tab-apps');
            const btnModels = document.getElementById('btn-tab-models');
            const secApps = document.getElementById('section-apps');
            const secModels = document.getElementById('section-models');

            const activeClass = "relative px-6 sm:px-8 py-2 md:py-2.5 text-sm md:text-base font-semibold rounded-full transition-all duration-300 text-gray-900 bg-white shadow-[0_2px_10px_rgba(0,0,0,0.08)]";
            const inactiveClass = "relative px-6 sm:px-8 py-2 md:py-2.5 text-sm md:text-base font-medium rounded-full transition-all duration-300 text-gray-500 hover:text-gray-800";

            if (tabId === 'apps') {
                btnApps.className = activeClass;
                btnModels.className = inactiveClass;
                
                secModels.classList.remove('tab-content-active');
                secModels.classList.add('hidden');
                
                secApps.classList.remove('hidden');
                // 触发重绘以播放动画
                void secApps.offsetWidth; 
                secApps.classList.add('tab-content-active');
            } else {
                btnApps.className = inactiveClass;
                btnModels.className = activeClass;
                
                secApps.classList.remove('tab-content-active');
                secApps.classList.add('hidden');
                
                secModels.classList.remove('hidden');
                void secModels.offsetWidth;
                secModels.classList.add('tab-content-active');
            }
        }

        // 动态抓取 Hugging Face 模型与静默回退
        async function fetchHFModels() {
            const container = document.getElementById('models-container');
            const author = 'MoringLabs';
            
            try {
                const response = await fetch(`https://huggingface.co/api/models?author=${author}&sort=downloads&direction=-1`);
                if (!response.ok) throw new Error('API fetch failed');
                
                const models = await response.json();
                if (models.length === 0) throw new Error('No models found');

                container.innerHTML = ''; 
                
                models.slice(0, 6).forEach(model => {
                    const modelName = model.id.split('/')[1];
                    const downloads = model.downloads || 0;
                    const likes = model.likes || 0;
                    
                    const cardHTML = `
                        <a href="https://huggingface.co/${model.id}" target="_blank" class="app-card model-card rounded-[1.5rem] p-4 sm:p-5 md:p-6 group relative overflow-hidden flex flex-col justify-between h-full min-h-[140px]">
                            <div class="flex items-start gap-3 sm:gap-4 mb-3">
                                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-50 to-blue-50 border border-blue-100 flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform duration-300">
                                    <span class="text-xl">🤗</span>
                                </div>
                                <h3 class="font-bold text-gray-800 text-base md:text-lg leading-tight line-clamp-2 mt-1">${modelName}</h3>
                            </div>
                            
                            <div class="flex items-center gap-3 sm:gap-4 mt-auto pt-4 border-t border-gray-100/80">
                                <span class="flex items-center text-xs text-gray-500 font-semibold bg-gray-50 px-2 py-1 rounded-md">
                                    <i class="fas fa-download text-gray-400 mr-1.5"></i> ${downloads.toLocaleString()}
                                </span>
                                <span class="flex items-center text-xs text-gray-500 font-semibold bg-gray-50 px-2 py-1 rounded-md">
                                    <i class="fas fa-heart text-red-400 mr-1.5"></i> ${likes.toLocaleString()}
                                </span>
                            </div>
                        </a>
                    `;
                    container.innerHTML += cardHTML;
                });

            } catch (error) {
                console.warn("Failed to fetch dynamically, loading fallback models.", error);
                
                const fallbackModels = [
                    { 
                        name: 'Qwen3.5-122B-A10B-MLX-3.7bit-VL', 
                        desc: '3.7-bit mixed-precision with vision support. Saves ~13GB to keep long-context inference comfortably within 96GB Apple Silicon.',
                        url: 'https://huggingface.co/MoringLabs/Qwen3.5-122B-A10B-MLX-3.7bit-VL' 
                    },
                    { 
                        name: 'GPT-OSS-120B-MLX-3.6bit', 
                        desc: '3.6-bit mixed-precision quantization. Frees ~17GB to prevent swapping on 96GB Macs during heavy contexts.',
                        url: 'https://huggingface.co/MoringLabs/GPT-OSS-120B-MLX-3.6bit' 
                    }
                ];
                
                container.innerHTML = '';
                fallbackModels.forEach(m => {
                    container.innerHTML += `
                        <a href="${m.url}" target="_blank" class="app-card model-card rounded-[1.5rem] p-4 sm:p-5 md:p-6 group relative overflow-hidden flex flex-col justify-between h-full min-h-[160px]">
                            <div>
                                <div class="flex items-start gap-3 sm:gap-4 mb-3">
                                    <div class="w-10 h-10 rounded-xl bg-gray-50 border border-gray-100 flex items-center justify-center flex-shrink-0">
                                        <i class="fas fa-microchip text-gray-500 text-lg"></i>
                                    </div>
                                    <h3 class="font-bold text-gray-800 text-base md:text-lg leading-tight line-clamp-2 mt-1">${m.name}</h3>
                                </div>
                                <p class="text-[11px] sm:text-xs text-gray-500 font-medium line-clamp-3 mb-4 leading-relaxed">${m.desc}</p>
                            </div>
                            <div class="flex items-center mt-auto pt-4 border-t border-gray-100/80">
                                <span class="text-xs text-gray-400 font-bold group-hover:text-blue-500 transition-colors">
                                    View on Hugging Face &rarr;
                                </span>
                            </div>
                        </a>
                    `;
                });
            }
        }

        window.onload = () => {
            const initialLang = detectLanguage();
            document.getElementById('langSelector').value = initialLang;
            updateUI(initialLang);
            
            localStorage.setItem('moring_lang', initialLang);
            
            setTimeout(() => document.querySelector('main.animate-fade-in').classList.add('opacity-100'), 100);
            
            fetchHFModels();
        };
    </script>
