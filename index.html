<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moring Labs - Native macOS Apps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f7; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
</head>
<body>

    <nav class="glass border-b border-gray-200 fixed top-0 w-full z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <span class="text-xl font-extrabold tracking-tighter">MORING LABS</span>
            <select id="langSelector" onchange="switchLang(this.value)" class="bg-transparent text-sm font-semibold outline-none cursor-pointer">
                <option value="en">English (US)</option>
                <option value="zh-CN">中文 (简体)</option>
                <option value="zh-TW">中文 (繁體)</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
                <option value="es">Español</option>
                <option value="it">Italiano</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="pt">Português</option>
                <option value="ru">Русский</option>
            </select>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6 max-w-6xl mx-auto">
        <section class="space-y-12">
            <div class="flex flex-col md:flex-row items-center md:items-end gap-8 text-center md:text-left">
                <img id="appIcon" src="" class="w-32 h-32 rounded-[28px] shadow-xl" alt="App Icon">
                <div class="flex-1">
                    <h1 class="text-4xl font-extrabold tracking-tight mb-2">PDF Merge & Split Assistant</h1>
                    <p id="appTagline" class="text-xl text-gray-500 font-medium mb-6"></p>
                    <div class="flex flex-wrap justify-center md:justify-start gap-4 font-bold">
                        <a href="#" class="bg-black text-white px-8 py-3 rounded-full hover:opacity-80 transition"><i class="fab fa-apple mr-2"></i> App Store</a>
                        <a href="privacy.html" class="px-8 py-3 rounded-full border border-gray-300 hover:bg-white transition">Privacy</a>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="screenshot-gallery">
                <img id="shot-1" src="" class="rounded-2xl shadow-2xl border border-gray-100" loading="lazy">
                <img id="shot-2" src="" class="rounded-2xl shadow-2xl border border-gray-100" loading="lazy">
                <img id="shot-3" src="" class="rounded-2xl shadow-2xl border border-gray-100" loading="lazy">
                <img id="shot-4" src="" class="rounded-2xl shadow-2xl border border-gray-100" loading="lazy">
            </div>
        </section>
    </main>

    <script>
        // 【配置区】完全适配你的软件导出规范
        const INFO = {
            name: "PDF Merge & Split Assistant",
            versionDir: "2.1.0",     // 文件夹名
            versionFile: "2_1_0",    // 文件名用的下划线版本号
            platform: "Mac",
            langMap: {
                "en": "en-US", "zh-CN": "zh-Hans", "zh-TW": "zh-Hant",
                "ja": "ja", "ko": "ko", "de": "de-DE", "fr": "fr-FR",
                "es": "es-ES", "it": "it", "pt": "pt-BR", "ru": "ru"
            }
        };

        const TEXTS = {
            "en": "Privacy-focused, native macOS PDF management.",
            "zh-CN": "隐私至上，专为 macOS 设计的原生 PDF 工具。"
        };

        function updateUI(lang) {
            const fLang = INFO.langMap[lang] || "en-US";
            
            // 关键改动：所有素材都在 APP/ 这个总文件夹下
            const basePath = `APP/${INFO.name}_Assets`;
            
            // 1. 设置图标
            document.getElementById('appIcon').src = `${basePath}/${INFO.name}-AppIcon.webp`;
            document.getElementById('appTagline').innerText = TEXTS[lang] || TEXTS['en'];

            // 2. 拼接截图路径
            for (let i = 1; i <= 4; i++) {
                const fileName = `${INFO.name}-${INFO.versionFile}-${fLang}-${INFO.platform}-${i}.webp`;
                const path = `${basePath}/Screenshots/${INFO.versionDir}/${fLang}/${INFO.platform}/${fileName}`;
                
                document.getElementById(`shot-${i}`).src = path;
            }
        }

        function switchLang(lang) {
            localStorage.setItem('moring_lang', lang);
            updateUI(lang);
        }

        window.onload = () => {
            const savedLang = localStorage.getItem('moring_lang') || 'en';
            document.getElementById('langSelector').value = savedLang;
            updateUI(savedLang);
        };
    </script>
</body>
</html>
