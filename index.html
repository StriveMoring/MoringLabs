<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moring Labs | Premium macOS Apps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #000000; color: #ffffff; overflow-x: hidden; }

        /* 极致的深色毛玻璃导航 */
        .glass-nav { 
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(24px) saturate(180%); 
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        /* 横向滑动长廊隐藏滚动条 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 截图卡片的动态呼吸与悬浮效果 */
        .gallery-track { display: flex; gap: 2rem; padding: 1rem 50vw 2rem 2rem; }
        .shot-wrapper {
            flex: 0 0 80%; max-width: 900px;
            border-radius: 1.5rem; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            scroll-snap-align: center;
        }
        .shot-wrapper:hover {
            transform: scale(1.02) translateY(-10px);
            box-shadow: 0 30px 60px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 滚动渐显动画 */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* App 图标光晕 */
        .icon-glow { filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.15)); }
    </style>
</head>
<body class="antialiased selection:bg-blue-500 selection:text-white">

    <nav class="glass-nav fixed top-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <span class="text-xl font-extrabold tracking-tighter text-white flex items-center gap-2">
                <i class="fab fa-apple"></i> MORING LABS
            </span>
            <div class="relative group">
                <select id="langSelector" onchange="switchLang(this.value)" class="bg-white/10 hover:bg-white/20 transition-colors text-sm font-semibold outline-none cursor-pointer py-2 pl-4 pr-8 rounded-full appearance-none text-white border border-white/10">
                    <option value="en" class="text-black">🇺🇸 English</option>
                    <option value="zh-CN" class="text-black">🇨🇳 简体中文</option>
                    <option value="zh-TW" class="text-black">🇭🇰 繁體中文</option>
                    <option value="ja" class="text-black">🇯🇵 日本語</option>
                    <option value="de" class="text-black">🇩🇪 Deutsch</option>
                    <option value="es" class="text-black">🇪🇸 Español</option>
                </select>
                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-[10px] pointer-events-none opacity-60"></i>
            </div>
        </div>
    </nav>

    <header class="pt-48 pb-20 px-6 text-center reveal">
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">
            Crafting pure native <br>experiences.
        </h1>
        <p class="text-xl text-gray-400 font-medium max-w-2xl mx-auto">Independent macOS studio focused on performance, privacy, and elegant design.</p>
    </header>

    <main id="portfolio-container" class="pb-32 flex flex-col gap-40 overflow-hidden"></main>

    <footer class="py-12 border-t border-white/10 bg-black">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-sm text-gray-500 font-medium">
            <p>&copy; 2026 Moring Labs.</p>
            <div class="space-x-6 mt-4 md:mt-0">
                <a href="mailto:strivemoring@gmail.com" class="hover:text-white transition-colors">Contact</a>
            </div>
        </div>
    </footer>

    <script>
        // ==========================================
        // 核心管理区：未来加新软件，只需在这里加一段配置！
        // ==========================================
        const APPS_CONFIG = [
            {
                name: "PDF Merge & Split Assistant",
                versionDir: "2.1.0",
                versionFile: "2_1_0",
                platform: "Mac",
                imgCount: 4, // 这个软件有几张图
                taglines: {
                    "en": "Privacy-focused, native macOS PDF management.",
                    "zh-CN": "隐私至上，专为 macOS 设计的原生 PDF 工具。"
                }
            }
            // 未来如果你要加上传工具，直接取消下面这段注释：
            /*
            ,{
                name: "AppSubmitter",
                versionDir: "1.0.0",
                versionFile: "1_0_0",
                platform: "Mac",
                imgCount: 4,
                taglines: {
                    "en": "The ultimate tool for Apple developers to manage App Store Connect.",
                    "zh-CN": "专为苹果开发者打造的 App Store Connect 管理利器。"
                }
            }
            */
        ];

        // 统一的语言映射表
        const LANG_MAP = {
            "en": "en-US", "zh-CN": "zh-Hans", "zh-TW": "zh-Hant",
            "ja": "ja", "ko": "ko", "de": "de-DE", "fr": "fr-FR",
            "es": "es-ES", "it": "it", "pt": "pt-BR", "ru": "ru"
        };

        // 渲染整个作品集
        function renderPortfolio(langCode) {
            const container = document.getElementById('portfolio-container');
            container.innerHTML = ''; // 清空容器
            
            const fLang = LANG_MAP[langCode] || "en-US";

            APPS_CONFIG.forEach((app, index) => {
                const basePath = `APP/${app.name}_Assets`;
                const iconPath = `${basePath}/${app.name}-AppIcon.webp`;
                const tagline = app.taglines[langCode] || app.taglines['en'];

                // 1. 构建 App 的头部信息
                const section = document.createElement('section');
                section.className = 'reveal';
                
                let htmlContent = `
                    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center md:items-start gap-8 text-center md:text-left mb-12">
                        <img src="${iconPath}" class="w-32 h-32 md:w-40 md:h-40 rounded-[32px] icon-glow border border-white/10" alt="${app.name} Icon">
                        <div class="flex-1 pt-2">
                            <h2 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4">${app.name}</h2>
                            <p class="text-xl text-gray-400 font-medium mb-8 max-w-2xl">${tagline}</p>
                            <div class="flex flex-wrap justify-center md:justify-start gap-4">
                                <a href="#" class="bg-white text-black px-8 py-3 rounded-full font-bold hover:scale-105 transition-transform"><i class="fab fa-apple mr-2"></i> Mac App Store</a>
                                <a href="privacy.html" class="px-8 py-3 rounded-full border border-white/20 font-bold hover:bg-white/10 transition-colors">Privacy</a>
                            </div>
                        </div>
                    </div>
                    <div class="w-full overflow-x-auto hide-scrollbar snap-x snap-mandatory">
                        <div class="gallery-track">
                `;

                // 2. 动态生成截图
                for (let i = 1; i <= app.imgCount; i++) {
                    const fileName = `${app.name}-${app.versionFile}-${fLang}-${app.platform}-${i}.webp`;
                    const imgPath = `${basePath}/Screenshots/${app.versionDir}/${fLang}/${app.platform}/${fileName}`;
                    
                    htmlContent += `
                        <div class="shot-wrapper bg-white/5 relative flex items-center justify-center min-h-[300px]">
                            <i class="fas fa-circle-notch fa-spin absolute text-white/20 text-3xl z-0"></i>
                            <img src="${imgPath}" class="w-full h-auto relative z-10 opacity-0 transition-opacity duration-500" onload="this.style.opacity=1; this.previousElementSibling.style.display='none';">
                        </div>
                    `;
                }

                htmlContent += `</div></div>`;
                section.innerHTML = htmlContent;
                container.appendChild(section);
            });

            // 重新触发滚动监听
            observeElements();
        }

        // 监听滚动动画 (让元素滑入屏幕时才有动画)
        function observeElements() {
            const reveals = document.querySelectorAll('.reveal');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });
            
            reveals.forEach(el => observer.observe(el));
        }

        function switchLang(lang) {
            localStorage.setItem('moring_lang', lang);
            renderPortfolio(lang);
        }

        window.onload = () => {
            const savedLang = localStorage.getItem('moring_lang') || 'en';
            document.getElementById('langSelector').value = savedLang;
            renderPortfolio(savedLang);
            setTimeout(() => document.querySelector('header.reveal').classList.add('active'), 100);
        };
    </script>
</body>
</html>
