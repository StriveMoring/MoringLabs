        function updateUI(lang) {
            const data = TRANSLATIONS[lang] || TRANSLATIONS['en'];
            
            document.getElementById('hero-title').innerHTML = data.heroTitle;
            document.getElementById('hero-desc').innerText = data.heroDesc;
            document.getElementById('section-title').innerText = data.sectionTitle;
            
            document.getElementById('pdf-desc').innerText = data.pdfDesc;
            document.getElementById('pdf-learn').innerText = data.pdfLearn;
            
            document.getElementById('submitter-desc').innerText = data.submitterDesc;
            document.getElementById('tag-coming-1').innerText = data.tagComing;
            document.getElementById('btn-coming-1').innerText = data.btnComing;
            
            document.getElementById('rocket-desc').innerText = data.rocketDesc;
            document.getElementById('tag-coming-2').innerText = data.tagComing;
            document.getElementById('btn-coming-2').innerText = data.btnComing;
            
            document.getElementById('new-proj-title').innerText = data.newProjTitle;
            document.getElementById('new-proj-desc').innerText = data.newProjDesc;
            
            document.getElementById('contact-us').innerText = data.contact;
        }

        function switchLang(lang) {
            localStorage.setItem('moring_lang', lang);
            updateUI(lang);
        }

        function detectLanguage() {
            const savedLang = localStorage.getItem('moring_lang');
            if (savedLang && TRANSLATIONS[savedLang]) {
                return savedLang;
            }

            const browserLang = navigator.language || navigator.userLanguage;
            
            if (browserLang.startsWith('zh')) {
                return (browserLang.includes('CN') || browserLang.includes('Hans')) ? 'zh-CN' : 'zh-TW';
            }
            if (browserLang.startsWith('ja')) return 'ja';
            if (browserLang.startsWith('ko')) return 'ko';
            if (browserLang.startsWith('de')) return 'de';
            if (browserLang.startsWith('fr')) return 'fr';
            if (browserLang.startsWith('es')) return 'es';
            if (browserLang.startsWith('it')) return 'it';
            if (browserLang.startsWith('pt')) return 'pt';
            if (browserLang.startsWith('ru')) return 'ru';

            return 'en';
        }

        window.onload = () => {
            const initialLang = detectLanguage();
            document.getElementById('langSelector').value = initialLang;
            updateUI(initialLang);
            
            localStorage.setItem('moring_lang', initialLang);
            
            setTimeout(() => document.querySelector('main.animate-fade-in').classList.add('opacity-100'), 100);
        };
    </script>
</body>
</html>
