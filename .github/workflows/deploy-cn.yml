name: deploy-cn
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare CN build (domain injection)
        run: |
          set -euo pipefail
          BUILD_DIR="$(mktemp -d)"
          export BUILD_DIR
          rsync -a --exclude '.git' --exclude '.github' ./ "$BUILD_DIR/"
          python - <<'PY'
          import os
          import pathlib

          root = pathlib.Path(os.environ["BUILD_DIR"])
          exts = {".html", ".xml", ".txt", ".webmanifest", ".json"}
          for path in root.rglob("*"):
              if path.is_file() and path.suffix in exts:
                  data = path.read_text(encoding="utf-8")
                  new = data.replace("https://moringlabs.com", "https://moringlabs.cn")
                  if new != data:
                      path.write_text(new, encoding="utf-8")
          PY
          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.CN_SSH_KEY }}

      - name: Rsync to CN server
        env:
          CN_HOST: ${{ secrets.CN_HOST }}
          CN_USER: ${{ secrets.CN_USER }}
          CN_PORT: ${{ secrets.CN_PORT || 22 }}
          CN_PATH: ${{ secrets.CN_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no -p "$CN_PORT" "$CN_USER@$CN_HOST" "mkdir -p \"$CN_PATH\""

          rsync -az --delete --timeout=120 \
            --exclude '.git' --exclude '.github' \
            -e "ssh -p $CN_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=3" \
            "$BUILD_DIR/" "$CN_USER@$CN_HOST:$CN_PATH/"
