        // UI Update Logic
        function updateUI(langCode) {
            const data = translations[langCode] || translations['en'];
            
            document.title = data.title + " | FormatRocket";
            document.getElementById('nav-back-text').innerText = data.backText;
            document.getElementById('mainTitle').innerText = data.title;
            document.getElementById('effectiveDate').innerText = data.date;
            document.getElementById('introText').innerText = data.intro;
            
            document.getElementById('contactTitle').innerText = data.contactTitle;
            document.getElementById('contactText').innerText = data.contactText;
            document.getElementById('websiteText').innerText = data.websiteText;
            
            const container = document.getElementById('content-container');
            container.innerHTML = '';
            
            data.sections.forEach(section => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <h2 class="text-xl md:text-2xl font-bold text-gray-900 mb-4 tracking-tight">${section.h}</h2>
                    <div class="prose-custom text-base md:text-lg">${section.p}</div>
                `;
                container.appendChild(div);
            });
        }

        // Language Switcher Logic
        function switchLang(langCode) {
            localStorage.setItem('formatrocket_lang', langCode);
            updateUI(langCode);
        }

        // Init
        window.onload = function() {
            const savedLang = localStorage.getItem('formatrocket_lang') || 'en';
            const finalLang = translations[savedLang] ? savedLang : 'en';
            
            const selector = document.getElementById('langSelector');
            if(selector.querySelector(`option[value="${finalLang}"]`)) {
                selector.value = finalLang;
            }
            
            updateUI(finalLang);
            setTimeout(() => document.querySelector('main.animate-fade-in').classList.add('opacity-100'), 100);
        }
    </script>
