        /* 核心修复：单纯锁死视口宽度，绝对不碰颜色 */
        html, body {

            width: 100vw;
            max-width: 100%;

            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;

            color: #1d1d1f;

            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .ambient-glow {
            position: absolute; 
            width: 1200px; 
            height: 1200px;
            background: radial-gradient(circle, rgba(64,156,255,0.08) 0%, rgba(255,255,255,0) 70%);
            top: -300px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: -1; 
            pointer-events: none;
        }

        .bento-card {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
        }

        @keyframes fade-in-up { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* 针对长文本内容的定制排版样式 */
        .prose-custom { color: #6b7280; line-height: 1.7; }
        .prose-custom p { margin-bottom: 1.25rem; }
        .prose-custom h3 { font-size: 1.125rem; font-weight: 700; color: #1f2937; margin-top: 2rem; margin-bottom: 0.75rem; }
        .prose-custom ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 1.25rem; }
        .prose-custom li { margin-bottom: 0.5rem; }
        .prose-custom strong { color: #374151; font-weight: 600; }
        .prose-custom a { color: #3b82f6; text-decoration: none; }
        .prose-custom a:hover { text-decoration: underline; }
        .prose-custom table { width: 100%; border-collapse: collapse; margin-top: 1.25rem; margin-bottom: 1.5rem; font-size: 0.875rem; }
        @media (min-width: 768px) { .prose-custom table { font-size: 0.95rem; } }
        .prose-custom th, .prose-custom td { border: 1px solid #e5e7eb; padding: 0.75rem 1rem; text-align: left; vertical-align: top; }
        .prose-custom th { background-color: #f9fafb; font-weight: 600; color: #111827; }
        .prose-custom tr:nth-child(even) { background-color: #fcfcfd; }
    </style>

    <script>
        const translations = {
            "en": {
                backText: "Back to App",
                title: "Privacy Policy",
                date: "Effective Date: March 18, 2026 | Last Updated: March 18, 2026",
                intro: "Moring Labs (\"we\", \"us\", \"our\") built FormatRocket as a commercial application. This Privacy Policy explains how we handle information when you use FormatRocket (\"the App\").",
                contactTitle: "Contact Us",
                contactText: "If you have any questions, please contact:",
                websiteText: "Website:",
                sections: [
                    { h: "Summary", p: "<ul><li>All file conversions happen locally on your Mac. We never upload your files.</li><li>We use Apple's CloudKit to sync usage quotas and invite codes — no third-party servers.</li><li>We do not collect personal information, analytics, or tracking data.</li><li>We do not use any third-party SDKs for analytics, advertising, or tracking.</li></ul>" },
                    { h: "Information We Collect", p: "<h3>Information We Do NOT Collect</h3><ul><li>We do <strong>not</strong> collect your name, email address, phone number, or any personal contact information.</li><li>We do <strong>not</strong> access, upload, or transmit the content of your files (videos, audio, images).</li><li>We do <strong>not</strong> use any third-party analytics, crash reporting, or advertising SDKs.</li><li>We do <strong>not</strong> track your usage behavior, browsing history, or location.</li></ul><h3>Information Stored Locally on Your Device</h3><p>The following data is stored locally within the App's sandbox on your Mac and is never transmitted to any server:</p><ul><li><strong>User Preferences</strong>: Language, output directory, conversion settings, UI preferences. Stored in the App's sandboxed UserDefaults.</li><li><strong>Conversion Tasks</strong>: Task history (file names, status, timestamps) stored in a local SwiftData database within the App's sandbox.</li><li><strong>Device Identifier</strong>: A locally generated identifier used solely to generate your invite code. Stored in the macOS Keychain.</li><li><strong>Entitlement Status</strong>: Your subscription tier (Free, Pro, or Ultimate) cached locally in the Keychain for offline access.</li><li><strong>Initial Quota</strong>: First-time usage quota stored in the Keychain.</li></ul><h3>Information Synced via Apple CloudKit</h3><p>If you are signed in to iCloud on your Mac, the following data is synced through Apple's CloudKit service:</p><ul><li><strong>Weekly Conversion Quota</strong>: The number of remaining conversions for the current week (video, audio, image counts). Used to enforce free-tier limits and sync across your devices.</li><li><strong>Bonus Conversions</strong>: Additional conversion credits earned through invitations or sharing.</li><li><strong>Invite Code Records</strong>: Your invite code, usage count, and the iCloud user IDs of users who redeemed your code. Used to verify invitations and distribute rewards.</li><li><strong>Share-to-Unlock Count</strong>: The number of times you have shared the App this week. Used to enforce the weekly sharing limit.</li><li><strong>Server Timestamps</strong>: Used to determine the current calendar week for quota resets. This prevents circumvention by local clock manipulation.</li></ul><p>All CloudKit data is stored in Apple's infrastructure, governed by <a href='https://www.apple.com/privacy/' target='_blank'>Apple's Privacy Policy</a>. We access this data solely through Apple's CloudKit API and do not operate any independent servers.</p><h3>In-App Purchases</h3><p>Subscription and purchase information is processed entirely by Apple through StoreKit 2. We do not receive or store your payment details, Apple ID, or financial information. We only receive a confirmation of your entitlement tier (Free, Pro, or Ultimate).</p>" },
                    { h: "How We Use Information", p: "<table><thead><tr><th>Data</th><th>Purpose</th></tr></thead><tbody><tr><td>Local preferences</td><td>Restore your settings between sessions</td></tr><tr><td>Conversion task history</td><td>Display task status and enable retry</td></tr><tr><td>Device identifier</td><td>Generate a unique invite code</td></tr><tr><td>Weekly quota (CloudKit)</td><td>Enforce free-tier conversion limits</td></tr><tr><td>Invite records (CloudKit)</td><td>Verify invite codes and distribute rewards</td></tr><tr><td>Share count (CloudKit)</td><td>Enforce weekly sharing limits</td></tr><tr><td>Server timestamps (CloudKit)</td><td>Determine calendar week for quota resets</td></tr><tr><td>Entitlement status</td><td>Determine which features are available</td></tr></tbody></table>" },
                    { h: "Data Sharing", p: "<p>We do <strong>not</strong> share, sell, rent, or disclose your data to any third parties.</p><p>The only external service we interact with is Apple's CloudKit, which is used solely for the purposes described above. No data is sent to any non-Apple server.</p>" },
                    { h: "Data Retention", p: "<ul><li><strong>Local data</strong> (preferences, task history, Keychain items) persists on your device until you delete the App or manually clear it.</li><li><strong>CloudKit data</strong> (quotas, invite records) is retained in your iCloud account. You can delete your iCloud data by signing out of iCloud or contacting us.</li><li><strong>Conversion output files</strong> are saved to the directory you specify. We do not manage or delete your output files.</li></ul>" },
                    { h: "Data Security", p: "<ul><li><strong>Local storage</strong>: Sensitive data (entitlement status, device identifier, quota) is stored in the macOS Keychain, which is encrypted by the operating system.</li><li><strong>Network communication</strong>: All CloudKit communication uses HTTPS encryption provided by Apple.</li><li><strong>App Sandbox</strong>: FormatRocket runs in the macOS App Sandbox, restricting file access to user-authorized locations only.</li><li><strong>No remote servers</strong>: We do not operate any servers. All server-side logic is handled by Apple's CloudKit infrastructure.</li></ul>" },
                    { h: "Children's Privacy", p: "<p>FormatRocket is not directed at children under 13. We do not knowingly collect information from children. Since we do not collect personal information from any user, this is inherently satisfied.</p>" },
                    { h: "Your Rights", p: "<p>Since we do not collect personal information on our own servers, there is minimal data to manage. However:</p><ul><li><strong>Local data</strong>: You can delete all local data by removing the App from your Mac.</li><li><strong>Keychain data</strong>: Removed when the App is deleted, or you can manually remove FormatRocket entries via the Keychain Access app.</li><li><strong>CloudKit data</strong>: Synced to your iCloud account. You can request deletion by contacting us at the email below.</li><li><strong>Purchase history</strong>: Managed by Apple. See <a href='https://support.apple.com/manage-subscriptions' target='_blank'>Apple's support page</a> to manage subscriptions.</li></ul>" },
                    { h: "Changes to This Policy", p: "<p>We may update this Privacy Policy from time to time. Changes will be posted within the App and on our website. Continued use of the App after changes constitutes acceptance of the updated policy.</p>" },
                    { h: "Open Source Components", p: "<p>FormatRocket includes the following open-source libraries, used solely for local media processing. None of these libraries collect or transmit any data:</p><table><thead><tr><th>Library</th><th>License</th><th>Purpose</th></tr></thead><tbody><tr><td>FFmpeg 7.1.1</td><td>LGPL 2.1+</td><td>Media encoding/decoding</td></tr><tr><td>libvpx 1.15.2</td><td>BSD 3-Clause</td><td>VP8/VP9 video codec</td></tr><tr><td>libaom 3.13.1</td><td>BSD 2-Clause</td><td>AV1 video codec</td></tr><tr><td>LAME 3.100</td><td>LGPL 2.0</td><td>MP3 encoder</td></tr><tr><td>libvorbis 1.3.7</td><td>BSD 3-Clause</td><td>Ogg Vorbis audio codec</td></tr><tr><td>libopus 1.5.2</td><td>BSD 3-Clause</td><td>Opus audio codec</td></tr><tr><td>libogg 1.3.5</td><td>BSD 3-Clause</td><td>Ogg container format</td></tr><tr><td>libwebp 1.5.0</td><td>BSD 3-Clause</td><td>WebP image codec</td></tr><tr><td>XZ Utils 5.6.4</td><td>Public Domain</td><td>LZMA compression</td></tr><tr><td>VMAF 3.0.0</td><td>BSD 2-Clause</td><td>Video quality assessment</td></tr></tbody></table>" }
                ]
            },
            "zh-CN": {
                backText: "返回应用",
                title: "隐私政策",
                date: "生效日期：2026年3月18日 | 最后更新：2026年3月18日",
                intro: "Moring Labs（“我们”）开发了 FormatRocket 作为一款商业应用程序。本隐私政策解释了当您使用 FormatRocket（“本应用”）时，我们如何处理信息。",
                contactTitle: "联系方式",
                contactText: "如有疑问，请联系：",
                websiteText: "官方网站：",
                sections: [
                    { h: "摘要", p: "<ul><li>所有文件转换均在您的 Mac 本地进行。我们绝不会上传您的文件。</li><li>我们使用 Apple 的 CloudKit 同步使用额度和邀请码 — 不存在任何第三方服务器。</li><li>我们不收集个人信息、分析数据或跟踪数据。</li><li>我们不使用任何用于分析、广告或跟踪的第三方 SDK。</li></ul>" },
                    { h: "我们收集的信息", p: "<h3>我们【不】收集的信息</h3><ul><li>我们<strong>不</strong>收集您的姓名、电子邮件地址、电话号码或任何个人联系信息。</li><li>我们<strong>不</strong>访问、上传或传输您的文件内容（视频、音频、图片）。</li><li>我们<strong>不</strong>使用任何第三方分析、崩溃报告或广告 SDK。</li><li>我们<strong>不</strong>跟踪您的使用行为、浏览历史或位置。</li></ul><h3>本地存储在您设备上的信息</h3><p>以下数据存储在您 Mac 上本应用的沙盒本地中，绝不会传输到任何服务器：</p><ul><li><strong>用户偏好设置</strong>：语言、输出目录、转换设置、UI 偏好。存储在应用沙盒内的 UserDefaults 中。</li><li><strong>转换任务</strong>：任务历史记录（文件名、状态、时间戳）存储在应用沙盒内的本地 SwiftData 数据库中。</li><li><strong>设备标识符</strong>：本地生成的标识符，仅用于生成您的邀请码。存储在 macOS 钥匙串 (Keychain) 中。</li><li><strong>权益状态</strong>：您的订阅层级（免费版、专业版或终极版）缓存在本地钥匙串中，以供离线访问。</li><li><strong>初始额度</strong>：首次使用的额度存储在钥匙串中。</li></ul><h3>通过 Apple CloudKit 同步的信息</h3><p>如果您在 Mac 上登录了 iCloud，以下数据将通过 Apple 的 CloudKit 服务进行同步：</p><ul><li><strong>每周转换额度</strong>：当前自然周剩余的转换次数。用于执行免费层级的限制并跨设备同步。</li><li><strong>奖励转换次数</strong>：通过邀请或分享获得的额外转换额度。</li><li><strong>邀请码记录</strong>：您的邀请码、使用次数以及兑换您邀请码的用户的 iCloud 用户 ID。用于验证邀请并分发奖励。</li><li><strong>分享解锁次数</strong>：您本周分享该应用程序的次数。用于执行每周分享限制。</li><li><strong>服务器时间戳</strong>：用于确定重置额度的当前自然周。防止通过修改本地时钟来绕过限制。</li></ul><p>所有 CloudKit 数据均存储在 Apple 的基础设施中，受 <a href='https://www.apple.com/legal/privacy/szh/' target='_blank'>Apple 隐私政策</a>的约束。我们仅通过 Apple 的 CloudKit API 访问这些数据，并不运营任何独立的服务器。</p><h3>应用内购买</h3><p>订阅和购买信息完全由 Apple 通过 StoreKit 2 处理。我们不接收或存储您的付款详细信息、Apple ID 或财务信息。我们仅接收您的权益层级确认。</p>" },
                    { h: "我们如何使用信息", p: "<table><thead><tr><th>数据</th><th>目的</th></tr></thead><tbody><tr><td>本地偏好设置</td><td>在会话之间恢复您的设置</td></tr><tr><td>转换任务历史</td><td>显示任务状态并允许重试</td></tr><tr><td>设备标识符</td><td>生成唯一的邀请码</td></tr><tr><td>每周额度 (CloudKit)</td><td>执行免费层级的转换限制</td></tr><tr><td>邀请记录 (CloudKit)</td><td>验证邀请码并分发奖励</td></tr><tr><td>分享次数 (CloudKit)</td><td>执行每周分享限制</td></tr><tr><td>服务器时间戳 (CloudKit)</td><td>确定额度重置的自然周</td></tr><tr><td>权益状态</td><td>确定您可以使用的功能</td></tr></tbody></table>" },
                    { h: "数据共享", p: "<p>我们<strong>不</strong>向任何第三方共享、出售、出租或披露您的数据。</p><p>我们交互的唯一外部服务是 Apple 的 CloudKit，仅用于上述目的。不会将任何数据发送到非 Apple 服务器。</p>" },
                    { h: "数据保留", p: "<ul><li><strong>本地数据</strong>（首选项、任务历史、钥匙串项目）将保留在您的设备上，直到您删除本应用或手动清除它。</li><li><strong>CloudKit 数据</strong>（额度、邀请记录）保留在您的 iCloud 帐户中。您可以通过注销 iCloud 或联系我们来删除您的 iCloud 数据。</li><li><strong>转换输出文件</strong>保存在您指定的目录中。我们不管理或删除您的输出文件。</li></ul>" },
                    { h: "数据安全", p: "<ul><li><strong>本地存储</strong>：敏感数据（权益状态、设备标识符、配额）存储在 macOS 钥匙串中，由操作系统进行加密。</li><li><strong>网络通信</strong>：所有 CloudKit 通信均使用 Apple 提供的 HTTPS 加密。</li><li><strong>应用沙盒</strong>：FormatRocket 运行在 macOS 应用沙盒中，仅将文件访问权限限制在用户授权的位置。</li><li><strong>无远程服务器</strong>：我们不运营任何服务器。所有服务器端逻辑均由 Apple 的 CloudKit 基础设施处理。</li></ul>" },
                    { h: "儿童隐私", p: "<p>FormatRocket 不面向 13 岁以下的儿童。我们不会有意收集儿童的信息。由于我们不收集任何用户的个人信息，因此天然满足这一要求。</p>" },
                    { h: "您的权利", p: "<p>由于我们不在自己的服务器上收集个人信息，因此几乎没有需要管理的数据。然而：</p><ul><li><strong>本地数据</strong>：您可以通过从 Mac 中移除本应用来删除所有本地数据。</li><li><strong>钥匙串数据</strong>：在删除应用时一并移除，或者您可以通过“钥匙串访问”应用手动移除 FormatRocket 条目。</li><li><strong>CloudKit 数据</strong>：同步到您的 iCloud 帐户。您可以通过以下电子邮件联系我们请求删除。</li><li><strong>购买历史记录</strong>：由 Apple 管理。请参阅 <a href='https://support.apple.com/zh-cn/HT202039' target='_blank'>Apple 支持页面</a>以管理订阅。</li></ul>" },
                    { h: "本政策的变更", p: "<p>我们可能会不时更新本隐私政策。更改将在应用内和我们的网站上发布。更改后继续使用本应用即构成接受更新后的政策。</p>" },
                    { h: "开源组件", p: "<p>FormatRocket 包含以下开源库，仅用于本地媒体处理。这些库均不收集或传输任何数据：</p><table><thead><tr><th>库名称</th><th>许可证</th><th>用途</th></tr></thead><tbody><tr><td>FFmpeg 7.1.1</td><td>LGPL 2.1+</td><td>媒体编码/解码</td></tr><tr><td>libvpx 1.15.2</td><td>BSD 3-Clause</td><td>VP8/VP9 视频编解码器</td></tr><tr><td>libaom 3.13.1</td><td>BSD 2-Clause</td><td>AV1 视频编解码器</td></tr><tr><td>LAME 3.100</td><td>LGPL 2.0</td><td>MP3 编码器</td></tr><tr><td>libvorbis 1.3.7</td><td>BSD 3-Clause</td><td>Ogg Vorbis 音频编解码器</td></tr><tr><td>libopus 1.5.2</td><td>BSD 3-Clause</td><td>Opus 音频编解码器</td></tr><tr><td>libogg 1.3.5</td><td>BSD 3-Clause</td><td>Ogg 容器格式</td></tr><tr><td>libwebp 1.5.0</td><td>BSD 3-Clause</td><td>WebP 图像编解码器</td></tr><tr><td>XZ Utils 5.6.4</td><td>Public Domain</td><td>LZMA 压缩</td></tr><tr><td>VMAF 3.0.0</td><td>BSD 2-Clause</td><td>视频质量评估</td></tr></tbody></table>" }
                ]
            },
            "zh-TW": {
                backText: "返回應用",
                title: "隱私權政策",
                date: "生效日期：2026年3月18日 | 最後更新：2026年3月18日",
                intro: "Moring Labs（「我們」）開發了 FormatRocket 作為一款商業應用程式。本隱私權政策解釋了當您使用 FormatRocket（「本應用」）時，我們如何處理資訊。",
                contactTitle: "聯絡方式",
                contactText: "如有疑問，請聯絡：",
                websiteText: "官方網站：",
                sections: [
                    { h: "摘要", p: "<ul><li>所有檔案轉換均在您的 Mac 本地進行。我們絕不會上傳您的檔案。</li><li>我們使用 Apple 的 CloudKit 同步使用額度和邀請碼 — 不存在任何第三方伺服器。</li><li>我們不收集個人資訊、分析數據或追蹤數據。</li><li>我們不使用任何用於分析、廣告或追蹤的第三方 SDK。</li></ul>" },
                    { h: "我們收集的資訊", p: "<h3>我們【不】收集的資訊</h3><ul><li>我們<strong>不</strong>收集您的姓名、電子郵件地址、電話號碼或任何個人聯絡資訊。</li><li>我們<strong>不</strong>存取、上傳或傳輸您的檔案內容（影片、音訊、圖片）。</li><li>我們<strong>不</strong>使用任何第三方分析、崩潰報告或廣告 SDK。</li><li>我們<strong>不</strong>追蹤您的使用行為、瀏覽歷史或位置。</li></ul><h3>本地儲存在您設備上的資訊</h3><p>以下數據儲存在您 Mac 上本應用的沙盒本地中，絕不會傳輸到任何伺服器：</p><ul><li><strong>使用者偏好設定</strong>：語言、輸出目錄、轉換設定、UI 偏好。儲存在應用沙盒內的 UserDefaults 中。</li><li><strong>轉換任務</strong>：任務歷史記錄（檔案名、狀態、時間戳）儲存在應用沙盒內的本地 SwiftData 資料庫中。</li><li><strong>設備標識符</strong>：本地生成的標識符，僅用於生成您的邀請碼。儲存在 macOS 鑰匙圈 (Keychain) 中。</li><li><strong>權益狀態</strong>：您的訂閱層級（免費版、專業版或終極版）緩存在本地鑰匙圈中，以供離線存取。</li><li><strong>初始額度</strong>：首次使用的額度儲存在鑰匙圈中。</li></ul><h3>透過 Apple CloudKit 同步的資訊</h3><p>如果您在 Mac 上登入了 iCloud，以下數據將透過 Apple 的 CloudKit 服務進行同步：</p><ul><li><strong>每週轉換額度</strong>：目前自然週剩餘的轉換次數。用於執行免費層級的限制並跨設備同步。</li><li><strong>獎勵轉換次數</strong>：透過邀請或分享獲得的額外轉換額度。</li><li><strong>邀請碼記錄</strong>：您的邀請碼、使用次數以及兌換您邀請碼的使用者的 iCloud 使用者 ID。用於驗證邀請並分發獎勵。</li><li><strong>分享解鎖次數</strong>：您本週分享該應用程式的次數。用於執行每週分享限制。</li><li><strong>伺服器時間戳</strong>：用於確定重置額度的目前自然週。防止透過修改本地時鐘來繞過限制。</li></ul><p>所有 CloudKit 數據均儲存在 Apple 的基礎設施中，受 <a href='https://www.apple.com/legal/privacy/tzh/' target='_blank'>Apple 隱私權政策</a>的約束。我們僅透過 Apple 的 CloudKit API 存取這些數據，並不營運任何獨立的伺服器。</p><h3>應用內購買</h3><p>訂閱和購買資訊完全由 Apple 透過 StoreKit 2 處理。我們不接收或儲存您的付款詳細資訊、Apple ID 或財務資訊。我們僅接收您的權益層級確認。</p>" },
                    { h: "我們如何使用資訊", p: "<table><thead><tr><th>數據</th><th>目的</th></tr></thead><tbody><tr><td>本地偏好設定</td><td>在會話之間恢復您的設定</td></tr><tr><td>轉換任務歷史</td><td>顯示任務狀態並允許重試</td></tr><tr><td>設備標識符</td><td>生成唯一的邀請碼</td></tr><tr><td>每週額度 (CloudKit)</td><td>執行免費層級的轉換限制</td></tr><tr><td>邀請記錄 (CloudKit)</td><td>驗證邀請碼並分發獎勵</td></tr><tr><td>分享次數 (CloudKit)</td><td>執行每週分享限制</td></tr><tr><td>伺服器時間戳 (CloudKit)</td><td>確定額度重置的自然週</td></tr><tr><td>權益狀態</td><td>確定您可以使用的功能</td></tr></tbody></table>" },
                    { h: "數據共享", p: "<p>我們<strong>不</strong>向任何第三方共享、出售、出租或披露您的數據。</p><p>我們互動的唯一外部服務是 Apple 的 CloudKit，僅用於上述目的。不會將任何數據發送到非 Apple 伺服器。</p>" },
                    { h: "數據保留", p: "<ul><li><strong>本地數據</strong>（偏好設定、任務歷史、鑰匙圈項目）將保留在您的設備上，直到您刪除本應用或手動清除它。</li><li><strong>CloudKit 數據</strong>（額度、邀請記錄）保留在您的 iCloud 帳戶中。您可以透過登出 iCloud 或聯絡我們來刪除您的 iCloud 數據。</li><li><strong>轉換輸出檔案</strong>保存在您指定的目錄中。我們不管理或刪除您的輸出檔案。</li></ul>" },
                    { h: "數據安全", p: "<ul><li><strong>本地儲存</strong>：敏感數據（權益狀態、設備標識符、配額）儲存在 macOS 鑰匙圈中，由作業系統進行加密。</li><li><strong>網路通訊</strong>：所有 CloudKit 通訊均使用 Apple 提供的 HTTPS 加密。</li><li><strong>應用沙盒</strong>：FormatRocket 運行在 macOS 應用沙盒中，僅將檔案存取權限限制在使用者授權的位置。</li><li><strong>無遠端伺服器</strong>：我們不營運任何伺服器。所有伺服器端邏輯均由 Apple 的 CloudKit 基礎設施處理。</li></ul>" },
                    { h: "兒童隱私", p: "<p>FormatRocket 不面向 13 歲以下的兒童。我們不會有意收集兒童的資訊。由於我們不收集任何使用者的個人資訊，因此天然滿足此要求。</p>" },
                    { h: "您的權利", p: "<p>由於我們不在自己的伺服器上收集個人資訊，因此幾乎沒有需要管理的數據。然而：</p><ul><li><strong>本地數據</strong>：您可以透過從 Mac 中移除本應用來刪除所有本地數據。</li><li><strong>鑰匙圈數據</strong>：在刪除應用時一併移除，或者您可以透過「鑰匙圈存取」應用手動移除 FormatRocket 項目。</li><li><strong>CloudKit 數據</strong>：同步到您的 iCloud 帳戶。您可以透過以下電子郵件聯絡我們請求刪除。</li><li><strong>購買歷史記錄</strong>：由 Apple 管理。請參閱 <a href='https://support.apple.com/zh-tw/HT202039' target='_blank'>Apple 支援頁面</a>以管理訂閱。</li></ul>" },
                    { h: "本政策的變更", p: "<p>我們可能會不時更新本隱私權政策。更改將在應用內和我們的網站上發布。更改後繼續使用本應用即構成接受更新後的政策。</p>" },
                    { h: "開源組件", p: "<p>FormatRocket 包含以下開源庫，僅用於本地媒體處理。這些庫均不收集或傳輸任何數據：</p><table><thead><tr><th>庫名稱</th><th>授權</th><th>用途</th></tr></thead><tbody><tr><td>FFmpeg 7.1.1</td><td>LGPL 2.1+</td><td>媒體編碼/解碼</td></tr><tr><td>libvpx 1.15.2</td><td>BSD 3-Clause</td><td>VP8/VP9 影片編解碼器</td></tr><tr><td>libaom 3.13.1</td><td>BSD 2-Clause</td><td>AV1 影片編解碼器</td></tr><tr><td>LAME 3.100</td><td>LGPL 2.0</td><td>MP3 編碼器</td></tr><tr><td>libvorbis 1.3.7</td><td>BSD 3-Clause</td><td>Ogg Vorbis 音訊編解碼器</td></tr><tr><td>libopus 1.5.2</td><td>BSD 3-Clause</td><td>Opus 音訊編解碼器</td></tr><tr><td>libogg 1.3.5</td><td>BSD 3-Clause</td><td>Ogg 容器格式</td></tr><tr><td>libwebp 1.5.0</td><td>BSD 3-Clause</td><td>WebP 圖像編解碼器</td></tr><tr><td>XZ Utils 5.6.4</td><td>Public Domain</td><td>LZMA 壓縮</td></tr><tr><td>VMAF 3.0.0</td><td>BSD 2-Clause</td><td>影片品質評估</td></tr></tbody></table>" }
                ]
            },
            "ja": {
                backText: "アプリに戻る",
                title: "プライバシーポリシー",
                date: "発効日：2026年3月18日 | 最終更新日：2026年3月18日",
                intro: "Moring Labs（「当社」）は、商用アプリケーションとしてFormatRocketを構築しました。本プライバシーポリシーは、お客様がFormatRocket（「本アプリ」）を使用する際の情報の取り扱いについて説明します。",
                contactTitle: "お問い合わせ",
                contactText: "ご不明な点がございましたら、こちらまでご連絡ください：",
                websiteText: "ウェブサイト：",
                sections: [
                    { h: "概要", p: "<ul><li>すべてのファイル変換はMac上でローカルに行われます。ファイルをアップロードすることは決してありません。</li><li>使用枠と招待コードの同期にはAppleのCloudKitを使用します。サードパーティのサーバーはありません。</li><li>個人情報、分析データ、追跡データは収集しません。</li><li>分析、広告、追跡のためのサードパーティ製SDKは使用しません。</li></ul>" },
                    { h: "収集する情報", p: "<h3>収集【しない】情報</h3><ul><li>氏名、メールアドレス、電話番号などの個人連絡先情報は<strong>収集しません</strong>。</li><li>ファイル（動画、音声、画像）のコンテンツへのアクセス、アップロード、送信は<strong>行いません</strong>。</li><li>サードパーティの分析、クラッシュレポート、広告SDKは<strong>使用しません</strong>。</li><li>使用状況、閲覧履歴、位置情報の追跡は<strong>行いません</strong>。</li></ul><h3>デバイスにローカル保存される情報</h3><p>以下のデータはMac上の本アプリのサンドボックス内にローカル保存され、サーバーには送信されません：</p><ul><li><strong>ユーザー設定</strong>：言語、出力先、変換設定、UI設定。UserDefaultsに保存されます。</li><li><strong>変換タスク</strong>：タスク履歴（ファイル名、状態、タイムスタンプ）はローカルのSwiftDataに保存されます。</li><li><strong>デバイス識別子</strong>：招待コードを生成するためだけに使用される識別子。キーチェーンに保存されます。</li><li><strong>権限ステータス</strong>：サブスクリプション層（Free, Pro, Ultimate）はオフラインアクセスのためキーチェーンに保存されます。</li><li><strong>初期使用枠</strong>：初回使用枠はキーチェーンに保存されます。</li></ul><h3>Apple CloudKit経由で同期される情報</h3><p>MacでiCloudにサインインしている場合、以下のデータがAppleのCloudKitサービスを通じて同期されます：</p><ul><li><strong>週間変換枠</strong>：今週の残り変換回数。無料層の制限適用とデバイス間の同期に使用されます。</li><li><strong>ボーナス変換</strong>：招待や共有で獲得した追加枠。</li><li><strong>招待コード記録</strong>：招待コード、使用回数、招待されたユーザーのiCloud ID。招待の検証と報酬の配布に使用されます。</li><li><strong>シェアロック解除回数</strong>：今週アプリを共有した回数。週間共有制限の適用に使用されます。</li><li><strong>サーバータイムスタンプ</strong>：枠リセット用のカレンダー週の決定に使用されます。これにより時計の操作による不正を防ぎます。</li></ul><p>すべてのCloudKitデータはAppleのインフラストラクチャに保存され、<a href='https://www.apple.com/jp/privacy/' target='_blank'>Appleのプライバシーポリシー</a>に準拠します。当社はAppleのCloudKit APIを通じてのみこのデータにアクセスし、独自のサーバーは運営していません。</p><h3>アプリ内課金</h3><p>サブスクリプションおよび購入情報は、StoreKit 2を通じてAppleによって完全に処理されます。当社は支払い情報、Apple ID、または財務情報を受け取ったり保存したりすることはありません。権限層の確認のみを受け取ります。</p>" },
                    { h: "情報の利用方法", p: "<table><thead><tr><th>データ</th><th>目的</th></tr></thead><tbody><tr><td>ローカル設定</td><td>セッション間の設定の復元</td></tr><tr><td>変換タスク履歴</td><td>タスクステータスの表示と再試行の有効化</td></tr><tr><td>デバイス識別子</td><td>一意の招待コードの生成</td></tr><tr><td>週間枠 (CloudKit)</td><td>無料層の変換制限の適用</td></tr><tr><td>招待記録 (CloudKit)</td><td>招待コードの検証と報酬の配布</td></tr><tr><td>共有回数 (CloudKit)</td><td>週間共有制限の適用</td></tr><tr><td>サーバータイムスタンプ</td><td>枠リセットのカレンダー週の決定</td></tr><tr><td>権限ステータス</td><td>利用可能な機能の判定</td></tr></tbody></table>" },
                    { h: "データの共有", p: "<p>当社は、お客様のデータを第三者に共有、販売、貸与、開示することは<strong>ありません</strong>。</p><p>当社がやり取りする唯一の外部サービスはAppleのCloudKitであり、上記の目的のみに使用されます。Apple以外のサーバーにデータが送信されることはありません。</p>" },
                    { h: "データの保持", p: "<ul><li><strong>ローカルデータ</strong>（設定、タスク履歴、キーチェーン項目）は、アプリを削除するか手動でクリアするまでデバイスに保持されます。</li><li><strong>CloudKitデータ</strong>（枠、招待記録）はiCloudアカウントに保持されます。iCloudからサインアウトするか、当社に連絡することで削除できます。</li><li><strong>変換出力ファイル</strong>はお客様が指定したディレクトリに保存されます。当社が管理または削除することはありません。</li></ul>" },
                    { h: "データセキュリティ", p: "<ul><li><strong>ローカルストレージ</strong>：機密データ（権限ステータス、デバイス識別子、枠）は、OSによって暗号化されるmacOSキーチェーンに保存されます。</li><li><strong>ネットワーク通信</strong>：すべてのCloudKit通信はAppleが提供するHTTPS暗号化を使用します。</li><li><strong>アプリサンドボックス</strong>：FormatRocketはmacOSアプリサンドボックス内で実行され、ファイルアクセスはユーザーが許可した場所に制限されます。</li><li><strong>リモートサーバーなし</strong>：当社はサーバーを運営していません。すべてのサーバー側ロジックはAppleのCloudKitインフラストラクチャによって処理されます。</li></ul>" },
                    { h: "子供のプライバシー", p: "<p>FormatRocketは13歳未満の子供を対象としていません。意図的に情報を収集することはありません。すべてのユーザーから個人情報を収集しないため、この条件は本質的に満たされています。</p>" },
                    { h: "お客様の権利", p: "<p>当社は独自のサーバーで個人情報を収集しないため、管理するデータは最小限です。ただし：</p><ul><li><strong>ローカルデータ</strong>：Macからアプリを削除することで、すべてのローカルデータを削除できます。</li><li><strong>キーチェーンデータ</strong>：アプリ削除時に削除されるか、「キーチェーンアクセス」アプリから手動で削除できます。</li><li><strong>CloudKitデータ</strong>：iCloudアカウントに同期されます。下記のメールで削除をリクエストできます。</li><li><strong>購入履歴</strong>：Appleによって管理されます。サブスクリプションの管理については<a href='https://support.apple.com/ja-jp/HT202039' target='_blank'>Appleのサポートページ</a>をご覧ください。</li></ul>" },
                    { h: "本ポリシーの変更", p: "<p>当社は本プライバシーポリシーを随時更新する場合があります。変更はアプリ内および当社のウェブサイトに掲載されます。変更後もアプリの使用を継続することで、更新されたポリシーに同意したものとみなされます。</p>" },
                    { h: "オープンソースコンポーネント", p: "<p>FormatRocketには、ローカルメディア処理のみに使用される以下のオープンソースライブラリが含まれています。これらのライブラリがデータを収集または送信することはありません：</p><table><thead><tr><th>ライブラリ</th><th>ライセンス</th><th>目的</th></tr></thead><tbody><tr><td>FFmpeg 7.1.1</td><td>LGPL 2.1+</td><td>メディアのエンコード/デコード</td></tr><tr><td>libvpx 1.15.2</td><td>BSD 3-Clause</td><td>VP8/VP9 ビデオコーデック</td></tr><tr><td>libaom 3.13.1</td><td>BSD 2-Clause</td><td>AV1 ビデオコーデック</td></tr><tr><td>LAME 3.100</td><td>LGPL 2.0</td><td>MP3 エンコーダー</td></tr><tr><td>libvorbis 1.3.7</td><td>BSD 3-Clause</td><td>Ogg Vorbis オーディオコーデック</td></tr><tr><td>libopus 1.5.2</td><td>BSD 3-Clause</td><td>Opus オーディオコーデック</td></tr><tr><td>libogg 1.3.5</td><td>BSD 3-Clause</td><td>Ogg コンテナ形式</td></tr><tr><td>libwebp 1.5.0</td><td>BSD 3-Clause</td><td>WebP 画像コーデック</td></tr><tr><td>XZ Utils 5.6.4</td><td>Public Domain</td><td>LZMA 圧縮</td></tr><tr><td>VMAF 3.0.0</td><td>BSD 2-Clause</td><td>動画品質評価</td></tr></tbody></table>" }
                ]
            },
            "ko": {
                backText: "앱으로 돌아가기",
                title: "개인정보 처리방침",
                date: "시행일: 2026년 3월 18일 | 최종 업데이트: 2026년 3월 18일",
                intro: "Moring Labs('당사')는 상용 애플리케이션으로 FormatRocket을 개발했습니다. 본 개인정보 처리방침은 귀하가 FormatRocket('앱')을 사용할 때 당사가 정보를 처리하는 방법을 설명합니다.",
                contactTitle: "문의하기",
                contactText: "본 방침에 대해 질문이 있으시면 다음으로 연락해 주십시오:",
                websiteText: "웹사이트:",
                sections: [
                    { h: "요약", p: "<ul><li>모든 파일 변환은 Mac에서 로컬로 진행됩니다. 당사는 귀하의 파일을 절대 업로드하지 않습니다.</li><li>당사는 Apple의 CloudKit을 사용하여 사용 할당량과 초대 코드를 동기화하며, 타사 서버는 없습니다.</li><li>당사는 개인정보, 분석 데이터 또는 추적 데이터를 수집하지 않습니다.</li><li>당사는 분석, 광고 또는 추적을 위한 타사 SDK를 사용하지 않습니다.</li></ul>" },
                    { h: "수집하는 정보", p: "<h3>수집하지 않는 정보</h3><ul><li>당사는 귀하의 이름, 이메일 주소, 전화번호 또는 개인 연락처 정보를 <strong>수집하지 않습니다</strong>.</li><li>당사는 귀하의 파일(비디오, 오디오, 이미지) 콘텐츠에 접근, 업로드 또는 전송하지 <strong>않습니다</strong>.</li><li>당사는 타사 분석, 크래시 보고 또는 광고 SDK를 사용하지 <strong>않습니다</strong>.</li><li>당사는 귀하의 사용 행동, 검색 기록 또는 위치를 추적하지 <strong>않습니다</strong>.</li></ul><h3>기기에 로컬로 저장되는 정보</h3><p>다음 데이터는 Mac의 앱 샌드박스 내에 로컬로 저장되며 어떤 서버로도 전송되지 않습니다:</p><ul><li><strong>사용자 기본 설정</strong>: 언어, 출력 디렉토리, 변환 설정 등. 앱 샌드박스의 UserDefaults에 저장됩니다.</li><li><strong>변환 작업</strong>: 작업 기록(파일 이름, 상태, 타임스탬프). 앱 샌드박스의 로컬 SwiftData에 저장됩니다.</li><li><strong>기기 식별자</strong>: 초대 코드를 생성하기 위해서만 사용되는 로컬 생성 식별자. macOS 키체인에 저장됩니다.</li><li><strong>권한 상태</strong>: 오프라인 액세스를 위해 키체인에 로컬 캐시된 구독 등급.</li><li><strong>초기 할당량</strong>: 키체인에 저장된 첫 사용 할당량.</li></ul><h3>Apple CloudKit을 통해 동기화되는 정보</h3><p>Mac에서 iCloud에 로그인한 경우 다음 데이터가 Apple의 CloudKit 서비스를 통해 동기화됩니다:</p><ul><li><strong>주간 변환 할당량</strong>: 현재 주에 남은 변환 횟수. 무료 등급 제한을 적용하고 기기 간 동기화에 사용됩니다.</li><li><strong>보너스 변환</strong>: 초대 또는 공유를 통해 얻은 추가 변환 크레딧.</li><li><strong>초대 코드 기록</strong>: 초대 코드, 사용 횟수 및 코드를 사용한 사용자의 iCloud ID.</li><li><strong>공유 잠금 해제 횟수</strong>: 이번 주 앱을 공유한 횟수. 주간 공유 제한을 적용하는 데 사용됩니다.</li><li><strong>서버 타임스탬프</strong>: 할당량 재설정을 위한 현재 달력 주를 결정하는 데 사용됩니다.</li></ul><p>모든 CloudKit 데이터는 Apple의 인프라에 저장되며 <a href='https://www.apple.com/kr/privacy/' target='_blank'>Apple의 개인정보 처리방침</a>의 적용을 받습니다. 당사는 Apple의 CloudKit API를 통해서만 이 데이터에 접근하며 독립적인 서버를 운영하지 않습니다.</p><h3>인앱 구매</h3><p>구독 및 구매 정보는 StoreKit 2를 통해 전적으로 Apple에서 처리합니다. 당사는 지불 세부 정보, Apple ID 또는 금융 정보를 수신하거나 저장하지 않습니다.</p>" },
                    { h: "정보 이용 방법", p: "<table><thead><tr><th>데이터</th><th>목적</th></tr></thead><tbody><tr><td>로컬 설정</td><td>세션 간 설정 복원</td></tr><tr><td>변환 작업 기록</td><td>작업 상태 표시 및 재시도 활성화</td></tr><tr><td>기기 식별자</td><td>고유한 초대 코드 생성</td></tr><tr><td>주간 할당량 (CloudKit)</td><td>무료 등급 변환 제한 적용</td></tr><tr><td>초대 기록 (CloudKit)</td><td>초대 코드 확인 및 보상 배포</td></tr><tr><td>공유 횟수 (CloudKit)</td><td>주간 공유 제한 적용</td></tr><tr><td>서버 타임스탬프 (CloudKit)</td><td>할당량 재설정을 위한 달력 주 결정</td></tr><tr><td>권한 상태</td><td>사용 가능한 기능 결정</td></tr></tbody></table>" },
                    { h: "데이터 공유", p: "<p>당사는 귀하의 데이터를 제3자에게 공유, 판매, 대여 또는 공개하지 <strong>않습니다</strong>.</p><p>당사가 상호 작용하는 유일한 외부 서비스는 위에서 설명한 목적으로만 사용되는 Apple의 CloudKit입니다. Apple 이외의 서버로 데이터가 전송되지 않습니다.</p>" },
                    { h: "데이터 보관", p: "<ul><li><strong>로컬 데이터</strong>(설정, 작업 기록, 키체인 항목)는 앱을 삭제하거나 수동으로 지울 때까지 기기에 유지됩니다.</li><li><strong>CloudKit 데이터</strong>(할당량, 초대 기록)는 iCloud 계정에 유지됩니다. iCloud에서 로그아웃하거나 당사에 연락하여 삭제할 수 있습니다.</li><li><strong>변환 출력 파일</strong>은 귀하가 지정한 디렉토리에 저장됩니다. 당사는 출력 파일을 관리하거나 삭제하지 않습니다.</li></ul>" },
                    { h: "데이터 보안", p: "<ul><li><strong>로컬 저장소</strong>: 민감한 데이터(권한 상태, 기기 식별자, 할당량)는 OS에 의해 암호화되는 macOS 키체인에 저장됩니다.</li><li><strong>네트워크 통신</strong>: 모든 CloudKit 통신은 Apple이 제공하는 HTTPS 암호화를 사용합니다.</li><li><strong>앱 샌드박스</strong>: FormatRocket은 macOS 앱 샌드박스에서 실행되어 파일 액세스를 사용자 승인 위치로만 제한합니다.</li><li><strong>원격 서버 없음</strong>: 당사는 서버를 운영하지 않습니다. 모든 서버 측 로직은 Apple의 CloudKit 인프라에서 처리합니다.</li></ul>" },
                    { h: "아동의 개인정보", p: "<p>FormatRocket은 13세 미만 아동을 대상으로 하지 않습니다. 당사는 아동의 정보를 고의로 수집하지 않습니다. 어떤 사용자로부터도 개인정보를 수집하지 않으므로 이는 본질적으로 충족됩니다.</p>" },
                    { h: "사용자의 권리", p: "<p>자체 서버에서 개인정보를 수집하지 않으므로 관리할 데이터가 최소화됩니다. 그러나:</p><ul><li><strong>로컬 데이터</strong>: Mac에서 앱을 제거하여 모든 로컬 데이터를 삭제할 수 있습니다.</li><li><strong>키체인 데이터</strong>: 앱 삭제 시 제거되거나 '키체인 접근' 앱을 통해 수동으로 제거할 수 있습니다.</li><li><strong>CloudKit 데이터</strong>: iCloud 계정에 동기화됩니다. 아래 이메일로 연락하여 삭제를 요청할 수 있습니다.</li><li><strong>구매 내역</strong>: Apple에서 관리합니다. 구독 관리는 <a href='https://support.apple.com/ko-kr/HT202039' target='_blank'>Apple 지원 페이지</a>를 참조하십시오.</li></ul>" },
                    { h: "본 방침의 변경", p: "<p>당사는 이 개인정보 처리방침을 수시로 업데이트할 수 있습니다. 변경 사항은 앱 내 및 웹사이트에 게시됩니다. 변경 후 앱을 계속 사용하는 것은 업데이트된 방침을 수락하는 것으로 간주됩니다.</p>" },
                    { h: "오픈소스 구성 요소", p: "<p>FormatRocket에는 로컬 미디어 처리에만 사용되는 다음 오픈소스 라이브러리가 포함되어 있습니다. 이 라이브러리 중 어느 것도 데이터를 수집하거나 전송하지 않습니다:</p><table><thead><tr><th>라이브러리</th><th>라이선스</th><th>목적</th></tr></thead><tbody><tr><td>FFmpeg 7.1.1</td><td>LGPL 2.1+</td><td>미디어 인코딩/디코딩</td></tr><tr><td>libvpx 1.15.2</td><td>BSD 3-Clause</td><td>VP8/VP9 비디오 코덱</td></tr><tr><td>libaom 3.13.1</td><td>BSD 2-Clause</td><td>AV1 비디오 코덱</td></tr><tr><td>LAME 3.100</td><td>LGPL 2.0</td><td>MP3 인코더</td></tr><tr><td>libvorbis 1.3.7</td><td>BSD 3-Clause</td><td>Ogg Vorbis 오디오 코덱</td></tr><tr><td>libopus 1.5.2</td><td>BSD 3-Clause</td><td>Opus 오디오 코덱</td></tr><tr><td>libogg 1.3.5</td><td>BSD 3-Clause</td><td>Ogg 컨테이너 형식</td></tr><tr><td>libwebp 1.5.0</td><td>BSD 3-Clause</td><td>WebP 이미지 코덱</td></tr><tr><td>XZ Utils 5.6.4</td><td>퍼블릭 도메인</td><td>LZMA 압축</td></tr><tr><td>VMAF 3.0.0</td><td>BSD 2-Clause</td><td>비디오 품질 평가</td></tr></tbody></table>" }
                ]
            },
            "de": {
                backText: "Zurück zur App",
                title: "Datenschutzerklärung",
                date: "Inkrafttreten: 18. März 2026 | Letzte Aktualisierung: 18. März 2026",
                intro: "Moring Labs (\"wir\", \"uns\", \"unser\") hat FormatRocket als kommerzielle Anwendung entwickelt. Diese Datenschutzerklärung erklärt, wie wir Informationen verarbeiten, wenn Sie FormatRocket (\"die App\") nutzen.",
                contactTitle: "Kontakt",
                contactText: "Bei Fragen zu dieser Datenschutzerklärung kontaktieren Sie bitte:",
                websiteText: "Webseite:",
                sections: [
                    { h: "Zusammenfassung", p: "<ul><li>Alle Dateikonvertierungen erfolgen lokal auf Ihrem Mac. Wir laden Ihre Dateien niemals hoch.</li><li>Wir nutzen Apple CloudKit, um Nutzungsquoten und Einladungscodes zu synchronisieren — keine Server von Drittanbietern.</li><li>Wir sammeln keine persönlichen Daten, Analysedaten oder Tracking-Daten.</li><li>Wir verwenden keine SDKs von Drittanbietern für Analysen, Werbung oder Tracking.</li></ul>" },
                    { h: "Informationen, die wir sammeln", p: "<h3>Informationen, die wir NICHT sammeln</h3><ul><li>Wir sammeln <strong>keinen</strong> Namen, keine E-Mail-Adresse, Telefonnummer oder sonstige persönliche Kontaktinformationen.</li><li>Wir greifen <strong>nicht</strong> auf den Inhalt Ihrer Dateien zu, laden sie nicht hoch und übertragen sie nicht.</li><li>Wir verwenden <strong>keine</strong> Analyse-, Absturzberichts- oder Werbe-SDKs von Drittanbietern.</li><li>Wir verfolgen <strong>nicht</strong> Ihr Nutzungsverhalten, Ihren Browserverlauf oder Ihren Standort.</li></ul><h3>Lokal auf Ihrem Gerät gespeicherte Informationen</h3><p>Die folgenden Daten werden lokal in der Sandbox der App auf Ihrem Mac gespeichert und niemals an einen Server übertragen:</p><ul><li><strong>Benutzereinstellungen</strong>: Sprache, Ausgabeverzeichnis, Konvertierungseinstellungen.</li><li><strong>Konvertierungsaufgaben</strong>: Aufgabenverlauf, lokal in SwiftData gespeichert.</li><li><strong>Gerätekennung</strong>: Ein lokal generierter Identifier, der nur zur Generierung Ihres Einladungscodes dient. Gespeichert in der macOS Keychain.</li><li><strong>Berechtigungsstatus</strong>: Ihre Abonnementstufe, lokal in der Keychain zwischengespeichert.</li><li><strong>Anfangsquote</strong>: Erste Nutzungsquote in der Keychain gespeichert.</li></ul><h3>Über Apple CloudKit synchronisierte Informationen</h3><p>Wenn Sie auf Ihrem Mac bei iCloud angemeldet sind, werden die folgenden Daten über Apples CloudKit-Dienst synchronisiert:</p><ul><li><strong>Wöchentliche Konvertierungsquote</strong>: Verbleibende Konvertierungen für die aktuelle Woche.</li><li><strong>Bonuskonvertierungen</strong>: Zusätzliche Credits durch Einladungen oder Teilen.</li><li><strong>Einladungscode-Einträge</strong>: Ihr Code, Nutzungshäufigkeit und die iCloud-IDs von Nutzern, die Ihren Code eingelöst haben.</li><li><strong>Share-to-Unlock-Zähler</strong>: Anzahl, wie oft Sie die App diese Woche geteilt haben.</li><li><strong>Server-Zeitstempel</strong>: Bestimmt die aktuelle Kalenderwoche für das Zurücksetzen der Quote.</li></ul><p>Alle CloudKit-Daten werden auf Apples Infrastruktur gespeichert und unterliegen der <a href='https://www.apple.com/de/legal/privacy/' target='_blank'>Apple-Datenschutzerklärung</a>. Wir greifen nur über die API darauf zu.</p><h3>In-App-Käufe</h3><p>Abonnement- und Kaufinformationen werden vollständig von Apple über StoreKit 2 verarbeitet. Wir erhalten oder speichern keine Zahlungsdaten.</p>" },
                    { h: "Wie wir Informationen verwenden", p: "<table><thead><tr><th>Daten</th><th>Zweck</th></tr></thead><tbody><tr><td>Lokale Einstellungen</td><td>Wiederherstellen Ihrer Einstellungen zwischen Sitzungen</td></tr><tr><td>Konvertierungsaufgabenverlauf</td><td>Anzeige des Status und Ermöglichen von Wiederholungen</td></tr><tr><td>Gerätekennung</td><td>Generierung eines eindeutigen Einladungscodes</td></tr><tr><td>Wöchentliche Quote (CloudKit)</td><td>Durchsetzung der Free-Tier-Limits</td></tr><tr><td>Einladungsdatensätze (CloudKit)</td><td>Überprüfung von Codes und Verteilung von Belohnungen</td></tr><tr><td>Freigabeanzahl (CloudKit)</td><td>Durchsetzung wöchentlicher Freigabelimits</td></tr><tr><td>Server-Zeitstempel (CloudKit)</td><td>Bestimmung der Woche für Quotenrücksetzungen</td></tr><tr><td>Berechtigungsstatus</td><td>Bestimmung der verfügbaren Funktionen</td></tr></tbody></table>" },
                    { h: "Datenweitergabe", p: "<p>Wir geben Ihre Daten <strong>nicht</strong> an Dritte weiter, verkaufen, vermieten oder offenbaren sie nicht.</p><p>Der einzige externe Dienst ist Apples CloudKit. Es werden keine Daten an Nicht-Apple-Server gesendet.</p>" },
                    { h: "Datenaufbewahrung", p: "<ul><li><strong>Lokale Daten</strong> (Einstellungen, Aufgabenverlauf) verbleiben auf Ihrem Gerät, bis Sie die App löschen.</li><li><strong>CloudKit-Daten</strong> (Quoten, Einladungen) verbleiben in Ihrem iCloud-Konto.</li><li><strong>Ausgabedateien</strong> werden im von Ihnen angegebenen Verzeichnis gespeichert.</li></ul>" },
                    { h: "Datensicherheit", p: "<ul><li><strong>Lokaler Speicher</strong>: Sensible Daten werden in der macOS Keychain gespeichert, die vom Betriebssystem verschlüsselt wird.</li><li><strong>Netzwerkkommunikation</strong>: Alle CloudKit-Kommunikationen verwenden von Apple bereitgestellte HTTPS-Verschlüsselung.</li><li><strong>App-Sandbox</strong>: FormatRocket läuft in der macOS-App-Sandbox.</li><li><strong>Keine Remote-Server</strong>: Wir betreiben keine eigenen Server.</li></ul>" },
                    { h: "Privatsphäre von Kindern", p: "<p>FormatRocket richtet sich nicht an Kinder unter 13 Jahren. Da wir grundsätzlich keine persönlichen Daten sammeln, ist dies naturgemäß erfüllt.</p>" },
                    { h: "Ihre Rechte", p: "<p>Da wir keine Daten auf unseren Servern sammeln, gibt es minimale Daten zu verwalten:</p><ul><li><strong>Lokale Daten</strong>: Sie können alle lokalen Daten löschen, indem Sie die App von Ihrem Mac entfernen.</li><li><strong>Keychain-Daten</strong>: Werden gelöscht, wenn die App entfernt wird.</li><li><strong>CloudKit-Daten</strong>: Synchronisiert mit Ihrem iCloud-Konto. Sie können die Löschung per E-Mail anfordern.</li><li><strong>Kaufhistorie</strong>: Wird von Apple verwaltet.</li></ul>" },
                    { h: "Änderungen dieser Richtlinie", p: "<p>Wir können diese Datenschutzerklärung von Zeit zu Zeit aktualisieren. Änderungen werden innerhalb der App und auf unserer Website veröffentlicht.</p>" },
                    { h: "Open-Source-Komponenten", p: "<p>FormatRocket enthält die folgenden Open-Source-Bibliotheken, die ausschließlich zur lokalen Medienverarbeitung verwendet werden. Keine dieser Bibliotheken sammelt oder überträgt Daten:</p><table><thead><tr><th>Bibliothek</th><th>Lizenz</th><th>Zweck</th></tr></thead><tbody><tr><td>FFmpeg 7.1.1</td><td>LGPL 2.1+</td><td>Medien-Codierung/Decodierung</td></tr><tr><td>libvpx 1.15.2</td><td>BSD 3-Clause</td><td>VP8/VP9 Video-Codec</td></tr><tr><td>libaom 3.13.1</td><td>BSD 2-Clause</td><td>AV1 Video-Codec</td></tr><tr><td>LAME 3.100</td><td>LGPL 2.0</td><td>MP3-Encoder</td></tr><tr><td>libvorbis 1.3.7</td><td>BSD 3-Clause</td><td>Ogg Vorbis Audio-Codec</td></tr><tr><td>libopus 1.5.2</td><td>BSD 3-Clause</td><td>Opus Audio-Codec</td></tr><tr><td>libogg 1.3.5</td><td>BSD 3-Clause</td><td>Ogg-Container-Format</td></tr><tr><td>libwebp 1.5.0</td><td>BSD 3-Clause</td><td>WebP Bild-Codec</td></tr><tr><td>XZ Utils 5.6.4</td><td>Public Domain</td><td>LZMA-Komprimierung</td></tr><tr><td>VMAF 3.0.0</td><td>BSD 2-Clause</td><td>Video-Qualitätsbewertung</td></tr></tbody></table>" }
                ]
            },
            "fr": {
                backText: "Retour à l'App",
                title: "Politique de Confidentialité",
                date: "Date d'entrée en vigueur : 18 mars 2026 | Dernière mise à jour : 18 mars 2026",
                intro: "Moring Labs (« nous », « notre », « nos ») a créé FormatRocket en tant qu'application commerciale. Cette politique de confidentialité explique comment nous traitons les informations lorsque vous utilisez FormatRocket (« l'Application »).",
                contactTitle: "Contactez-nous",
                contactText: "Si vous avez des questions concernant cette Politique, veuillez contacter :",
                websiteText: "Site Web:",
                sections: [
                    { h: "Résumé", p: "<ul><li>Toutes les conversions de fichiers s'effectuent localement sur votre Mac. Nous ne téléversons jamais vos fichiers.</li><li>Nous utilisons CloudKit d'Apple pour synchroniser les quotas et les codes d'invitation — aucun serveur tiers.</li><li>Nous ne collectons aucune information personnelle, ni donnée d'analyse ou de suivi.</li><li>Nous n'utilisons aucun SDK tiers pour l'analyse, la publicité ou le suivi.</li></ul>" },
                    { h: "Informations que nous collectons", p: "<h3>Informations que nous NE collectons PAS</h3><ul><li>Nous ne collectons <strong>pas</strong> votre nom, adresse e-mail, numéro de téléphone ou toute autre information de contact.</li><li>Nous n'accédons <strong>pas</strong>, ne téléversons pas et ne transmettons pas le contenu de vos fichiers.</li><li>Nous n'utilisons <strong>pas</strong> de SDK d'analyse, de rapport de plantage ou de publicité tiers.</li><li>Nous ne suivons <strong>pas</strong> votre comportement d'utilisation, votre historique de navigation ou votre localisation.</li></ul><h3>Informations stockées localement sur votre appareil</h3><p>Les données suivantes sont stockées localement dans le bac à sable (sandbox) de l'Application sur votre Mac et ne sont jamais transmises à un serveur :</p><ul><li><strong>Préférences de l'utilisateur</strong> : Langue, répertoire de sortie, paramètres de conversion.</li><li><strong>Tâches de conversion</strong> : Historique des tâches, stocké dans une base de données SwiftData locale.</li><li><strong>Identifiant de l'appareil</strong> : Utilisé uniquement pour générer votre code d'invitation. Stocké dans le trousseau (Keychain) macOS.</li><li><strong>Statut des droits</strong> : Votre niveau d'abonnement mis en cache localement dans le trousseau.</li><li><strong>Quota initial</strong> : Quota de première utilisation stocké dans le trousseau.</li></ul><h3>Informations synchronisées via Apple CloudKit</h3><p>Si vous êtes connecté à iCloud sur votre Mac, les données suivantes sont synchronisées via CloudKit :</p><ul><li><strong>Quota de conversion hebdomadaire</strong> : Nombre de conversions restantes pour la semaine en cours.</li><li><strong>Conversions bonus</strong> : Crédits supplémentaires gagnés par le biais d'invitations ou de partages.</li><li><strong>Enregistrements des codes d'invitation</strong> : Votre code et les identifiants iCloud des utilisateurs qui l'ont utilisé.</li><li><strong>Compteur de partage</strong> : Nombre de fois que vous avez partagé l'Application cette semaine.</li><li><strong>Horodatages du serveur</strong> : Utilisés pour déterminer la semaine civile en cours pour la réinitialisation des quotas.</li></ul><p>Toutes les données CloudKit sont régies par la <a href='https://www.apple.com/fr/privacy/' target='_blank'>Politique de confidentialité d'Apple</a>. Nous n'exploitons aucun serveur indépendant.</p><h3>Achats intégrés</h3><p>Les informations d'abonnement et d'achat sont traitées par Apple via StoreKit 2. Nous ne recevons ni ne stockons aucune information de paiement.</p>" },
                    { h: "Comment nous utilisons les informations", p: "<table><thead><tr><th>Données</th><th>Objectif</th></tr></thead><tbody><tr><td>Préférences locales</td><td>Restaurer vos paramètres entre les sessions</td></tr><tr><td>Historique des tâches</td><td>Afficher l'état et permettre de réessayer</td></tr><tr><td>Identifiant de l'appareil</td><td>Générer un code d'invitation unique</td></tr><tr><td>Quota hebdomadaire (CloudKit)</td><td>Appliquer les limites de conversion gratuites</td></tr><tr><td>Enregistrements (CloudKit)</td><td>Vérifier les codes et distribuer les récompenses</td></tr><tr><td>Compteur de partage</td><td>Appliquer les limites de partage hebdomadaires</td></tr><tr><td>Horodatages du serveur</td><td>Déterminer la semaine pour la réinitialisation du quota</td></tr><tr><td>Statut des droits</td><td>Déterminer les fonctionnalités disponibles</td></tr></tbody></table>" },
                    { h: "Partage de données", p: "<p>Nous ne partageons, ne vendons, ne louons et ne divulguons <strong>pas</strong> vos données à des tiers.</p><p>Le seul service externe avec lequel nous interagissons est CloudKit d'Apple. Aucune donnée n'est envoyée à des serveurs non Apple.</p>" },
                    { h: "Conservation des données", p: "<ul><li><strong>Données locales</strong> : Conservées sur votre appareil jusqu'à ce que vous supprimiez l'Application.</li><li><strong>Données CloudKit</strong> : Conservées dans votre compte iCloud.</li><li><strong>Fichiers de sortie</strong> : Enregistrés dans le répertoire que vous spécifiez. Nous ne les gérons ni ne les supprimons.</li></ul>" },
                    { h: "Sécurité des données", p: "<ul><li><strong>Stockage local</strong> : Les données sensibles sont stockées dans le trousseau macOS, chiffré par le système.</li><li><strong>Réseau</strong> : Toutes les communications CloudKit utilisent le chiffrement HTTPS d'Apple.</li><li><strong>Aucun serveur distant</strong> : Nous n'exploitons aucun serveur de manière indépendante.</li></ul>" },
                    { h: "Confidentialité des enfants", p: "<p>FormatRocket ne s'adresse pas aux enfants de moins de 13 ans. Comme nous ne collectons aucune information personnelle, cette condition est intrinsèquement remplie.</p>" },
                    { h: "Vos droits", p: "<p>Puisque nous ne collectons pas d'informations personnelles sur nos propres serveurs, les données à gérer sont minimes :</p><ul><li><strong>Données locales</strong> : Vous pouvez les supprimer en désinstallant l'Application.</li><li><strong>Données iCloud</strong> : Vous pouvez demander la suppression en nous contactant par e-mail.</li><li><strong>Historique des achats</strong> : Géré par Apple.</li></ul>" },
                    { h: "Modifications de cette Politique", p: "<p>Nous pouvons mettre à jour cette politique de temps à autre. Les modifications seront publiées dans l'Application et sur notre site Web.</p>" },
                    { h: "Composants Open Source", p: "<p>FormatRocket inclut les bibliothèques open-source suivantes, utilisées uniquement pour le traitement des médias locaux. Aucune de ces bibliothèques ne collecte ni ne transmet de données :</p><table><thead><tr><th>Bibliothèque</th><th>Licence</th><th>Objectif</th></tr></thead><tbody><tr><td>FFmpeg 7.1.1</td><td>LGPL 2.1+</td><td>Encodage/décodage multimédia</td></tr><tr><td>libvpx 1.15.2</td><td>BSD 3-Clause</td><td>Codec vidéo VP8/VP9</td></tr><tr><td>libaom 3.13.1</td><td>BSD 2-Clause</td><td>Codec vidéo AV1</td></tr><tr><td>LAME 3.100</td><td>LGPL 2.0</td><td>Encodeur MP3</td></tr><tr><td>libvorbis 1.3.7</td><td>BSD 3-Clause</td><td>Codec audio Ogg Vorbis</td></tr><tr><td>libopus 1.5.2</td><td>BSD 3-Clause</td><td>Codec audio Opus</td></tr><tr><td>libogg 1.3.5</td><td>BSD 3-Clause</td><td>Format conteneur Ogg</td></tr><tr><td>libwebp 1.5.0</td><td>BSD 3-Clause</td><td>Codec d'image WebP</td></tr><tr><td>XZ Utils 5.6.4</td><td>Domaine public</td><td>Compression LZMA</td></tr><tr><td>VMAF 3.0.0</td><td>BSD 2-Clause</td><td>Évaluation de la qualité vidéo</td></tr></tbody></table>" }
                ]
            },
            "es": {
                backText: "Volver a la App",
                title: "Política de Privacidad",
                date: "Fecha de entrada en vigor: 18 de marzo de 2026 | Última actualización: 18 de marzo de 2026",
                intro: "Moring Labs (\"nosotros\", \"nuestro\") construyó FormatRocket como una aplicación comercial. Esta Política de Privacidad explica cómo manejamos la información cuando utilizas FormatRocket (\"la Aplicación\").",
                contactTitle: "Contáctanos",
                contactText: "Si tienes alguna pregunta sobre esta Política, comunícate a:",
                websiteText: "Sitio Web:",
                sections: [
                    { h: "Resumen", p: "<ul><li>Todas las conversiones de archivos ocurren localmente en tu Mac. Nunca subimos tus archivos.</li><li>Usamos CloudKit de Apple para sincronizar cuotas y códigos de invitación, sin servidores de terceros.</li><li>No recopilamos información personal, análisis ni datos de seguimiento.</li><li>No usamos SDK de terceros para análisis, publicidad o seguimiento.</li></ul>" },
                    { h: "Información que recopilamos", p: "<h3>Información que NO recopilamos</h3><ul><li><strong>No</strong> recopilamos tu nombre, dirección de correo electrónico, número de teléfono ni información de contacto.</li><li><strong>No</strong> accedemos, subimos ni transmitimos el contenido de tus archivos.</li><li><strong>No</strong> usamos SDK de terceros para informes de fallos o publicidad.</li><li><strong>No</strong> rastreamos tu comportamiento de uso ni ubicación.</li></ul><h3>Información almacenada localmente en tu dispositivo</h3><p>Los siguientes datos se almacenan localmente dentro del entorno de pruebas (sandbox) de la Aplicación en tu Mac:</p><ul><li><strong>Preferencias del usuario</strong>: Idioma, directorio de salida, ajustes.</li><li><strong>Tareas de conversión</strong>: Historial de tareas, almacenado en una base de datos local de SwiftData.</li><li><strong>Identificador del dispositivo</strong>: Usado únicamente para generar tu código de invitación. Almacenado en el Llavero (Keychain) de macOS.</li><li><strong>Estado de derechos</strong>: Tu nivel de suscripción, en caché en el Llavero.</li><li><strong>Cuota inicial</strong>: Cuota de uso por primera vez.</li></ul><h3>Información sincronizada vía Apple CloudKit</h3><p>Si has iniciado sesión en iCloud en tu Mac, los siguientes datos se sincronizan:</p><ul><li><strong>Cuota de conversión semanal</strong>: Conversiones restantes de la semana.</li><li><strong>Conversiones de bonificación</strong>: Créditos adicionales obtenidos mediante invitaciones.</li><li><strong>Registros de códigos de invitación</strong>: Tu código y los ID de iCloud de quienes lo canjearon.</li><li><strong>Recuento de compartir para desbloquear</strong>: Veces que has compartido la App esta semana.</li><li><strong>Marcas de tiempo del servidor</strong>: Para determinar la semana y reiniciar cuotas.</li></ul><p>Todos los datos de CloudKit se rigen por la <a href='https://www.apple.com/es/privacy/' target='_blank'>Política de Privacidad de Apple</a>. No operamos servidores independientes.</p><h3>Compras dentro de la aplicación</h3><p>Las suscripciones y compras son procesadas por Apple a través de StoreKit 2. No recibimos ni almacenamos tus datos de pago.</p>" },
                    { h: "Cómo usamos la información", p: "<table><thead><tr><th>Dato</th><th>Propósito</th></tr></thead><tbody><tr><td>Preferencias locales</td><td>Restaurar tus ajustes entre sesiones</td></tr><tr><td>Historial de tareas</td><td>Mostrar el estado de las tareas</td></tr><tr><td>Identificador del dispositivo</td><td>Generar un código de invitación único</td></tr><tr><td>Cuota semanal (CloudKit)</td><td>Hacer cumplir los límites del nivel gratuito</td></tr><tr><td>Registros de invitación</td><td>Verificar códigos y distribuir recompensas</td></tr><tr><td>Recuento de compartir</td><td>Hacer cumplir los límites de compartir</td></tr><tr><td>Marcas de tiempo</td><td>Determinar la semana para reinicio de cuotas</td></tr><tr><td>Estado de derechos</td><td>Determinar las funciones disponibles</td></tr></tbody></table>" },
                    { h: "Intercambio de datos", p: "<p><strong>No</strong> compartimos, vendemos, alquilamos ni divulgamos tus datos a terceros.</p><p>El único servicio externo con el que interactuamos es CloudKit de Apple. No se envían datos a servidores que no sean de Apple.</p>" },
                    { h: "Retención de datos", p: "<ul><li><strong>Datos locales</strong>: Permanecen en tu dispositivo hasta que elimines la Aplicación.</li><li><strong>Datos de CloudKit</strong>: Se retienen en tu cuenta de iCloud.</li><li><strong>Archivos de salida</strong>: Se guardan en el directorio que especifiques. Nosotros no los gestionamos.</li></ul>" },
                    { h: "Seguridad de los datos", p: "<ul><li><strong>Almacenamiento local</strong>: Los datos sensibles se almacenan en el Llavero de macOS (cifrado por el SO).</li><li><strong>Red</strong>: Todas las comunicaciones usan el cifrado HTTPS de Apple.</li><li><strong>Sin servidores remotos</strong>: No operamos ningún servidor.</li></ul>" },
                    { h: "Privacidad infantil", p: "<p>FormatRocket no está dirigida a niños menores de 13 años. Dado que no recopilamos información personal de ningún usuario, esto se cumple inherentemente.</p>" },
                    { h: "Tus Derechos", p: "<p>Dado que no recopilamos información en servidores propios, los datos a gestionar son mínimos:</p><ul><li><strong>Datos locales</strong>: Puedes eliminarlos desinstalando la Aplicación de tu Mac.</li><li><strong>Datos de iCloud</strong>: Puedes solicitar su eliminación contactándonos por correo.</li><li><strong>Historial de compras</strong>: Gestionado por Apple.</li></ul>" },
                    { h: "Cambios en esta Política", p: "<p>Podemos actualizar esta política de vez en cuando. Los cambios se publicarán en la Aplicación y en nuestro sitio web.</p>" },
                    { h: "Componentes de código abierto", p: "<p>FormatRocket incluye las siguientes bibliotecas de código abierto, utilizadas solo para el procesamiento de medios locales. Ninguna recopila ni transmite datos:</p><table><thead><tr><th>Biblioteca</th><th>Licencia</th><th>Propósito</th></tr></thead><tbody><tr><td>FFmpeg 7.1.1</td><td>LGPL 2.1+</td><td>Codificación/decodificación multimedia</td></tr><tr><td>libvpx 1.15.2</td><td>BSD 3-Clause</td><td>Códec de video VP8/VP9</td></tr><tr><td>libaom 3.13.1</td><td>BSD 2-Clause</td><td>Códec de video AV1</td></tr><tr><td>LAME 3.100</td><td>LGPL 2.0</td><td>Codificador MP3</td></tr><tr><td>libvorbis 1.3.7</td><td>BSD 3-Clause</td><td>Códec de audio Ogg Vorbis</td></tr><tr><td>libopus 1.5.2</td><td>BSD 3-Clause</td><td>Códec de audio Opus</td></tr><tr><td>libogg 1.3.5</td><td>BSD 3-Clause</td><td>Formato contenedor Ogg</td></tr><tr><td>libwebp 1.5.0</td><td>BSD 3-Clause</td><td>Códec de imagen WebP</td></tr><tr><td>XZ Utils 5.6.4</td><td>Dominio Público</td><td>Compresión LZMA</td></tr><tr><td>VMAF 3.0.0</td><td>BSD 2-Clause</td><td>Evaluación de calidad de video</td></tr></tbody></table>" }
                ]
            },
            "it": {
                backText: "Torna all'App",
                title: "Informativa sulla Privacy",
                date: "Data di entrata in vigore: 18 marzo 2026 | Ultimo aggiornamento: 18 marzo 2026",
                intro: "Moring Labs (\"noi\", \"ci\", \"nostro\") ha sviluppato FormatRocket come applicazione commerciale. Questa Informativa sulla privacy spiega come gestiamo le informazioni quando utilizzi FormatRocket (\"l'App\").",
                contactTitle: "Contattaci",
                contactText: "In caso di domande su questa Informativa, contattare:",
                websiteText: "Sito web:",
                sections: [
                    { h: "Riepilogo", p: "<ul><li>Tutte le conversioni di file avvengono localmente sul tuo Mac. Non carichiamo mai i tuoi file.</li><li>Utilizziamo Apple CloudKit per sincronizzare le quote di utilizzo: nessun server di terze parti.</li><li>Non raccogliamo informazioni personali, analisi o dati di tracciamento.</li><li>Non utilizziamo SDK di terze parti per analisi, pubblicità o tracciamento.</li></ul>" },
                    { h: "Informazioni che raccogliamo", p: "<h3>Informazioni che NON raccogliamo</h3><ul><li><strong>Non</strong> raccogliamo il tuo nome, indirizzo email o informazioni di contatto personali.</li><li><strong>Non</strong> accediamo, carichiamo o trasmettiamo il contenuto dei tuoi file.</li><li><strong>Non</strong> utilizziamo SDK di terze parti per segnalazioni di arresti anomali o pubblicità.</li><li><strong>Non</strong> tracciamo il tuo comportamento di utilizzo o la tua posizione.</li></ul><h3>Informazioni archiviate localmente sul dispositivo</h3><p>I seguenti dati sono archiviati localmente nella sandbox dell'App sul tuo Mac:</p><ul><li><strong>Preferenze utente</strong>: Lingua, directory di output, impostazioni.</li><li><strong>Attività di conversione</strong>: Cronologia delle attività, archiviata in SwiftData locale.</li><li><strong>Identificatore del dispositivo</strong>: Utilizzato solo per generare il codice di invito. Archiviato nel Portachiavi (Keychain) macOS.</li><li><strong>Stato dei diritti</strong>: Il livello di abbonamento memorizzato nella cache locale.</li><li><strong>Quota iniziale</strong>: Quota per il primo utilizzo.</li></ul><h3>Informazioni sincronizzate tramite Apple CloudKit</h3><p>Se hai effettuato l'accesso a iCloud, vengono sincronizzati i seguenti dati:</p><ul><li><strong>Quota di conversione settimanale</strong>: Conversioni rimanenti per la settimana corrente.</li><li><strong>Conversioni bonus</strong>: Crediti extra ottenuti tramite inviti.</li><li><strong>Record del codice di invito</strong>: Il tuo codice e gli ID iCloud di chi lo ha riscattato.</li><li><strong>Conteggio condivisioni</strong>: Quante volte hai condiviso l'App questa settimana.</li><li><strong>Timestamp del server</strong>: Per determinare la settimana per il ripristino delle quote.</li></ul><p>Tutti i dati di CloudKit sono disciplinati dall'<a href='https://www.apple.com/it/privacy/' target='_blank'>Informativa sulla privacy di Apple</a>. Non gestiamo server indipendenti.</p><h3>Acquisti In-App</h3><p>Le informazioni di abbonamento sono elaborate da Apple tramite StoreKit 2. Non riceviamo o archiviamo i tuoi dettagli di pagamento.</p>" },
                    { h: "Come utilizziamo le informazioni", p: "<table><thead><tr><th>Dati</th><th>Scopo</th></tr></thead><tbody><tr><td>Preferenze locali</td><td>Ripristinare le impostazioni tra le sessioni</td></tr><tr><td>Cronologia attività</td><td>Mostrare lo stato dell'attività</td></tr><tr><td>Identificatore dispositivo</td><td>Generare un codice di invito univoco</td></tr><tr><td>Quota settimanale (CloudKit)</td><td>Applicare i limiti del livello gratuito</td></tr><tr><td>Record di invito</td><td>Verificare i codici e distribuire i premi</td></tr><tr><td>Conteggio condivisioni</td><td>Applicare i limiti di condivisione settimanali</td></tr><tr><td>Timestamp</td><td>Determinare la settimana per i ripristini della quota</td></tr><tr><td>Stato diritti</td><td>Determinare le funzioni disponibili</td></tr></tbody></table>" },
                    { h: "Condivisione dei dati", p: "<p><strong>Non</strong> condividiamo, vendiamo o divulghiamo i tuoi dati a terzi.</p><p>L'unico servizio esterno con cui interagiamo è CloudKit di Apple. Nessun dato viene inviato a server non Apple.</p>" },
                    { h: "Conservazione dei dati", p: "<ul><li><strong>Dati locali</strong>: Rimangono sul dispositivo fino all'eliminazione dell'App.</li><li><strong>Dati CloudKit</strong>: Vengono conservati nel tuo account iCloud.</li><li><strong>File di output</strong>: Vengono salvati nella directory da te specificata.</li></ul>" },
                    { h: "Sicurezza dei dati", p: "<ul><li><strong>Archiviazione locale</strong>: I dati sensibili sono archiviati nel Portachiavi macOS.</li><li><strong>Rete</strong>: Tutte le comunicazioni utilizzano la crittografia HTTPS fornita da Apple.</li><li><strong>Nessun server remoto</strong>: Non gestiamo alcun server.</li></ul>" },
                    { h: "Privacy dei bambini", p: "<p>FormatRocket non è rivolto a bambini di età inferiore a 13 anni. Poiché non raccogliamo informazioni personali, questo requisito è intrinsecamente soddisfatto.</p>" },
                    { h: "I tuoi diritti", p: "<p>Poiché non raccogliamo informazioni sui nostri server, ci sono dati minimi da gestire:</p><ul><li><strong>Dati locali</strong>: Puoi eliminarli rimuovendo l'App.</li><li><strong>Dati iCloud</strong>: Puoi richiederne l'eliminazione contattandoci via email.</li><li><strong>Cronologia acquisti</strong>: Gestita da Apple.</li></ul>" },
                    { h: "Modifiche a questa Politica", p: "<p>Potremmo aggiornare questa politica di tanto in tanto. Le modifiche saranno pubblicate nell'App e sul nostro sito web.</p>" },

Privacidade da Apple</a>. Nós não operamos servidores independentes.</p><h3>Compras no Aplicativo</h3><p>As informações de assinatura e compra são processadas inteiramente pela Apple através do StoreKit 2. Não recebemos ou armazenamos seus detalhes de pagamento.</p>" },

            "ru": {
                backText: "Назад к приложению",
                title: "Политика конфиденциальности",
                date: "Дата вступления в силу: 18 марта 2026 г. | Последнее обновление: 18 марта 2026 г.",
                intro: "Moring Labs («мы», «нас», «наш») создала FormatRocket как коммерческое приложение. В этой Политике конфиденциальности объясняется, как мы обрабатываем информацию при использовании FormatRocket («Приложение»).",
                contactTitle: "Связаться с нами",
                contactText: "Если у вас есть вопросы по этой Политике, свяжитесь с нами:",
                websiteText: "Веб-сайт:",
                sections: [
                    { h: "Краткое изложение", p: "<ul><li>Все конвертации файлов происходят локально на вашем Mac. Мы никогда не загружаем ваши файлы на сервер.</li><li>Мы используем Apple CloudKit для синхронизации квот и пригласительных кодов — никаких сторонних серверов.</li><li>Мы не собираем личную информацию, данные аналитики или данные отслеживания.</li><li>Мы не используем сторонние SDK для аналитики, рекламы или отслеживания.</li></ul>" },
                    { h: "Какую информацию мы собираем", p: "<h3>Информацию, которую мы НЕ собираем</h3><ul><li>Мы <strong>не</strong> собираем ваше имя, адрес электронной почты, номер телефона или любую личную контактную информацию.</li><li>Мы <strong>не</strong> получаем доступ, не загружаем и не передаем содержимое ваших файлов (видео, аудио, изображения).</li><li>Мы <strong>не</strong> используем сторонние SDK для аналитики или рекламы.</li><li>Мы <strong>не</strong> отслеживаем ваше поведение, историю просмотров или местоположение.</li></ul><h3>Информация, хранящаяся локально на вашем устройстве</h3><p>Следующие данные хранятся локально в песочнице Приложения на вашем Mac и никогда не передаются на серверы:</p><ul><li><strong>Пользовательские настройки</strong>: Язык, каталог вывода, настройки конвертации.</li><li><strong>Задачи конвертации</strong>: История задач, хранящаяся в локальной базе данных SwiftData.</li><li><strong>Идентификатор устройства</strong>: Локально сгенерированный идентификатор, используемый только для создания вашего кода приглашения. Хранится в Связке ключей (Keychain) macOS.</li><li><strong>Статус подписки</strong>: Ваш уровень подписки, локально кэшируемый в Связке ключей.</li><li><strong>Начальная квота</strong>: Квота для первого использования.</li></ul><h3>Информация, синхронизируемая через Apple CloudKit</h3><p>Если вы вошли в iCloud на своем Mac, через службу CloudKit синхронизируются следующие данные:</p><ul><li><strong>Еженедельная квота конвертаций</strong>: Количество оставшихся конвертаций на текущую неделю.</li><li><strong>Бонусные конвертации</strong>: Дополнительные кредиты, заработанные через приглашения.</li><li><strong>Записи кодов приглашений</strong>: Ваш код и идентификаторы iCloud пользователей, которые его активировали.</li><li><strong>Счетчик обмена</strong>: Сколько раз вы поделились Приложением на этой неделе.</li><li><strong>Временные метки сервера</strong>: Используются для определения текущей календарной недели для сброса квот.</li></ul><p>Все данные CloudKit хранятся в инфраструктуре Apple и регулируются <a href='https://www.apple.com/ru/privacy/' target='_blank'>Политикой конфиденциальности Apple</a>. Мы не управляем независимыми серверами.</p><h3>Встроенные покупки</h3><p>Информация о подписке и покупках полностью обрабатывается Apple через StoreKit 2. Мы не получаем и не храним ваши платежные данные.</p>" },
                    { h: "Как мы используем информацию", p: "<table><thead><tr><th>Данные</th><th>Цель</th></tr></thead><tbody><tr><td>Локальные настройки</td><td>Восстановление настроек между сеансами</td></tr><tr><td>История задач</td><td>Отображение статуса задачи</td></tr><tr><td>Идентификатор устройства</td><td>Генерация уникального кода приглашения</td></tr><tr><td>Еженедельная квота (CloudKit)</td><td>Применение лимитов бесплатного уровня</td></tr><tr><td>Записи приглашений (CloudKit)</td><td>Проверка кодов и распределение наград</td></tr><tr><td>Счетчик обмена (CloudKit)</td><td>Применение еженедельных лимитов обмена</td></tr><tr><td>Временные метки сервера</td><td>Определение недели для сброса квот</td></tr><tr><td>Статус подписки</td><td>Определение доступных функций</td></tr></tbody></table>" },
                    { h: "Передача данных", p: "<p>Мы <strong>не</strong> делимся, не продаем, не сдаем в аренду и не раскрываем ваши данные третьим лицам.</p><p>Единственный внешний сервис, с которым мы взаимодействуем, — это Apple CloudKit. Данные не отправляются на серверы, не принадлежащие Apple.</p>" },
                    { h: "Хранение данных", p: "<ul><li><strong>Локальные данные</strong>: Хранятся на вашем устройстве до удаления Приложения.</li><li><strong>Данные CloudKit</strong>: Хранятся в вашей учетной записи iCloud.</li><li><strong>Выходные файлы конвертации</strong>: Сохраняются в указанном вами каталоге.</li></ul>" },
                    { h: "Безопасность данных", p: "<ul><li><strong>Локальное хранилище</strong>: Конфиденциальные данные хранятся в Связке ключей macOS, которая шифруется операционной системой.</li><li><strong>Сетевое соединение</strong>: Все связи CloudKit используют HTTPS-шифрование, предоставляемое Apple.</li><li><strong>Нет удаленных серверов</strong>: Мы не управляем никакими серверами. Вся серверная логика обрабатывается инфраструктурой Apple CloudKit.</li></ul>" },
                    { h: "Конфиденциальность детей", p: "<p>FormatRocket не предназначен для детей младше 13 лет. Поскольку мы не собираем личную информацию ни от каких пользователей, это условие выполняется по умолчанию.</p>" },
                    { h: "Ваши права", p: "<p>Поскольку мы не собираем личную информацию на наших серверах, управлять нужно минимальным объемом данных:</p><ul><li><strong>Локальные данные</strong>: Вы можете удалить все локальные данные, удалив Приложение с вашего Mac.</li><li><strong>Данные iCloud</strong>: Вы можете запросить удаление, связавшись с нами по электронной почте.</li><li><strong>История покупок</strong>: Управляется Apple.</li></ul>" },
                    { h: "Изменения в этой Политике", p: "<p>Мы можем время от времени обновлять эту Политику конфиденциальности. Изменения будут публиковаться в Приложении и на нашем веб-сайте.</p>" },
                    { h: "Компоненты с открытым исходным кодом", p: "<p>FormatRocket включает следующие библиотеки с открытым исходным кодом, используемые только для локальной обработки мультимедиа. Ни одна из этих библиотек не собирает и не передает данные:</p><table><thead><tr><th>Библиотека</th><th>Лицензия</th><th>Цель</th></tr></thead><tbody><tr><td>FFmpeg 7.1.1</td><td>LGPL 2.1+</td><td>Кодирование/декодирование медиа</td></tr><tr><td>libvpx 1.15.2</td><td>BSD 3-Clause</td><td>Видеокодек VP8/VP9</td></tr><tr><td>libaom 3.13.1</td><td>BSD 2-Clause</td><td>Видеокодек AV1</td></tr><tr><td>LAME 3.100</td><td>LGPL 2.0</td><td>MP3-кодировщик</td></tr><tr><td>libvorbis 1.3.7</td><td>BSD 3-Clause</td><td>Аудиокодек Ogg Vorbis</td></tr><tr><td>libopus 1.5.2</td><td>BSD 3-Clause</td><td>Аудиокодек Opus</td></tr><tr><td>libogg 1.3.5</td><td>BSD 3-Clause</td><td>Формат контейнера Ogg</td></tr><tr><td>libwebp 1.5.0</td><td>BSD 3-Clause</td><td>Кодек изображений WebP</td></tr><tr><td>XZ Utils 5.6.4</td><td>Public Domain</td><td>Сжатие LZMA</td></tr><tr><td>VMAF 3.0.0</td><td>BSD 2-Clause</td><td>Оценка качества видео</td></tr></tbody></table>" }
                ]

        // UI Update Logic
        function updateUI(langCode) {
            const data = translations[langCode] || translations['en'];
            
            document.title = data.title + " | FormatRocket";
            document.getElementById('nav-back-text').innerText = data.backText;
            document.getElementById('mainTitle').innerText = data.title;
            document.getElementById('effectiveDate').innerText = data.date;
            document.getElementById('introText').innerText = data.intro;
            
            document.getElementById('contactTitle').innerText = data.contactTitle;
            document.getElementById('contactText').innerText = data.contactText;
            document.getElementById('websiteText').innerText = data.websiteText;
            
            const container = document.getElementById('content-container');
            container.innerHTML = '';
            
            data.sections.forEach(section => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <h2 class="text-xl md:text-2xl font-bold text-gray-900 mb-4 tracking-tight">${section.h}</h2>
                    <div class="prose-custom text-base md:text-lg">${section.p}</div>
                `;
                container.appendChild(div);
            });
        }

        // Language Switcher Logic
        function switchLang(langCode) {
            localStorage.setItem('formatrocket_lang', langCode);
            updateUI(langCode);
        }

        // Init
        window.onload = function() {
            const savedLang = localStorage.getItem('formatrocket_lang') || 'en';
            const finalLang = translations[savedLang] ? savedLang : 'en';
            
            const selector = document.getElementById('langSelector');
            if(selector.querySelector(`option[value="${finalLang}"]`)) {
                selector.value = finalLang;
            }
            
            updateUI(finalLang);
            setTimeout(() => document.querySelector('main.animate-fade-in').classList.add('opacity-100'), 100);
        }
    </script>
