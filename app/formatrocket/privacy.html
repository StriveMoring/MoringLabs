                "backText": "Retour à l'App",
                "title": "Politique de confidentialité",
                "date": "Date d'entrée en vigueur : 25 mars 2026 | Dernière mise à jour : 25 mars 2026",
                "intro": "",

                "contactText": "Si vous avez des questions sur cette Politique de Confidentialité, veuillez nous contacter à l'adresse :",
                "websiteText": "Site Web :",
                "sections": [
                        {
                                "h": "Résumé",
                                "p": "<ul><li>Toutes les conversions de fichiers sont effectuées localement sur votre Mac. Vos fichiers ne sont jamais téléchargés vers un serveur.</li><li>Nous ne collectons pas d'identifiants personnels tels que votre nom, adresse e-mail ou numéro de téléphone.</li><li>Nous n'intégrons aucun kit de développement logiciel (SDK) tiers d'analyse, de publicité ou de suivi.</li><li>Nous utilisons Apple CloudKit pour synchroniser vos quotas d'utilisation et historiques d'invitations, et notre propre serveur pour vérifier les achats et les quotas.</li></ul>"
                        },
                        {
                                "h": "Données stockées localement",
                                "p": "<p>Les données suivantes sont stockées uniquement sur votre appareil et ne sont jamais transmises à un serveur :</p><p><strong>Préférences de l'utilisateur</strong><br>Les paramètres incluant la langue, le répertoire de sortie, les paramètres de conversion et le thème de l'interface sont sauvegardés dans UserDefaults au sein du bac à sable de l'Application.</p><p><strong>Historique des tâches de conversion</strong><br>L'historique contenant le nom des fichiers, les statuts, les horodatages et les paramètres est stocké dans une base de données locale SwiftData.</p><p><strong>Stockage dans le Trousseau</strong><br>Les données sensibles suivantes sont chiffrées et sécurisées via le Trousseau macOS :</p><ul><li>Jetons d'authentification (JWT)</li><li>Cache de l'état d'abonnement (avec signature HMAC pour empêcher la modification)</li><li>Identifiants de l'appareil (UUID)</li><li>État de la réclamation du quota initial</li><li>Historique d'utilisation des codes d'invitation</li></ul>"
                        },
                        {
                                "h": "Données transmises à notre serveur",
                                "p": "<p>L'Application communique avec <code>api.moringlabs.com</code> en HTTPS pour la vérification des achats et la gestion des quotas. Toutes les requêtes contiennent une signature HMAC-SHA256 afin d'empêcher la falsification.</p><p><strong>Vérification de l'achat (/auth/verify)</strong><br>Nous transmettons l'identifiant de la transaction StoreKit, un identifiant d'appareil haché et votre identifiant utilisateur iCloud pour vérifier la légitimité de votre achat de l'App Store auprès de notre serveur et émettre un jeton d'authentification.</p><p><strong>Renouvellement du jeton (/auth/refresh)</strong><br>Nous transmettons l'identifiant d'appareil haché et l'identifiant iCloud afin de renouveler un jeton expiré.</p><p><strong>Déduction du quota (/quota/consume)</strong><br>Nous envoyons le type de conversion (vidéo/audio/image) et la quantité afin de les déduire du quota hebdomadaire d'un utilisateur gratuit depuis le serveur.</p><p><strong>Codes d'invitation (/invite/*)</strong><br>Nous envoyons ou recevons des codes pour générer, enregistrer et échanger des récompenses.</p><p><strong>Description de l'identifiant de l'appareil</strong><br>L'identifiant est généré via un hashage SHA256 du numéro de série matériel de votre Mac. Ce hachage est unidirectionnel et irréversible, il ne peut pas être reconstitué pour identifier le matériel d'origine.</p>"
                        },
                        {
                                "h": "Données synchronisées via Apple CloudKit",
                                "p": "<p>Lorsque vous êtes connecté à iCloud, les données suivantes sont synchronisées via le service CloudKit d'Apple :</p><ul><li><strong>Quota hebdomadaire de conversion</strong> : Le nombre de conversions vidéo, audio et d'images restants pour la semaine en cours, ainsi que les quotas bonus.</li><li><strong>Enregistrement de codes d'invitation</strong> : Votre code, son nombre d'utilisations, ainsi que les identifiants utilisateur iCloud de l'invitant et de l'invité.</li><li><strong>Historique de déblocage par le partage</strong> : Le nombre de partages de la semaine et l'identifiant hebdomadaire de suivi.</li><li><strong>Sauvegarde du statut de l'achat</strong> : L'identifiant produit, l'état d'activation et la date de dernière vérification, servant de sauvegarde du statut de votre achat sur CloudKit.</li><li><strong>Horodatages de serveur</strong> : Ils servent à déterminer la semaine calendaire en cours pour la réinitialisation des quotas, empêchant le contournement des limites par un changement frauduleux de l'horloge locale.</li></ul><p>Les données de CloudKit sont stockées sur l'infrastructure d'Apple et se voient régies par <a href='https://www.apple.com/fr/privacy/' target='_blank'>la Politique de Confidentialité d'Apple</a>.</p>"
                        },
                        {
                                "h": "Achats intégrés et abonnements",
                                "p": "<p>Les souscriptions et données d'achat sont gérées intégralement par Apple via StoreKit 2. L'Application ne reçoit ni ne conserve de données bancaires, d'identifiants Apple ou d'informations de paiement. Nous récupérons unilatéralement l'identifiant de la transaction, du produit, la date d'expiration ou les potentiels remboursements pour déterminer le droit d'utilisation.</p>"
                        },
                        {
                                "h": "Utilisation des données",
                                "p": "<table><thead><tr><th>Données</th><th>Objectif</th></tr></thead><tbody><tr><td>Préférences locales</td><td>Restauration des paramètres d'une session à l'autre</td></tr><tr><td>Tâches de conversion</td><td>Affichage de l'historique et prise en charge du nouvel essai</td></tr><tr><td>Identifiant d'appareil haché</td><td>Création de code d'invitation et validation de l'association d'appareil</td></tr><tr><td>Jeton d'authentification</td><td>Confirmation de l'authenticité de l'interface depuis le serveur</td></tr><tr><td>Quota de conversion hebdomadaire</td><td>Refus et application des limites liées aux utilisateurs gratuits</td></tr><tr><td>Codes d'invitation</td><td>Vérification et octroi d'un potentiel bonus</td></tr><tr><td>Compteur de partage</td><td>Contrôle de quantité d'accès bonus sur base hebdomadaire</td></tr><tr><td>Cache du statut de l'abonnement</td><td>Détermination des fonctions disponibles en étant complètement hors ligne</td></tr></tbody></table>"
                        },
                        {
                                "h": "Partage des données",
                                "p": "<p>Nous ne vendons, ne louons et ne divulguons aucune donnée utilisateur à des tiers.</p><p>L'Application communique exclusivement avec les services externes suivants :</p><ul><li><strong>api.moringlabs.com</strong> : Serveur du développeur en charge de vérifier et maintenir les achats et quotas.</li><li><strong>Apple CloudKit</strong> : Responsable du suivi des invitations et de la synchronisation des quotas.</li><li><strong>Apple StoreKit</strong> : Gestion stricte des achats et abonnements intégrés.</li></ul>"
                        },
                        {
                                "h": "Conservation et suppression des données",
                                "p": "<ul><li><strong>Données locales</strong> : Les préférences, l'historique de tâches et les éléments du trousseau sont automatiquement effacés lors de la suppression de l'Application. Vous pouvez manuellement supprimer <code>~/Library/Application Support/com.moring.FormatRocket</code> et les entrées pertinentes du Trousseaux d'accès pour nettoyer.</li><li><strong>Données CloudKit</strong> : Mises en cache dans votre compte iCloud. Demandez leur suppression via déconnexion iCloud ou par demande développeur.</li><li><strong>Données du Serveur</strong> : Les UUID et historiques de quotas de notre société sont enregistrés à jamais sur notre serveur. Signalez sans délai au bureau du développeur l'effacement définitif si souhaité.</li><li><strong>Fichiers de sortie de conversion</strong> : Sauvegardés dans le répertoire personnel du système que vous gérez individuellement.</li></ul>"
                        },
                        {
                                "h": "Sécurité des données",
                                "p": "<ul><li>Les données sensibles (jetons, droits d'acquisitions matériels) sont stockées et cryptées sécuritairement sur le Trousseau macOS.</li><li>Tout le fonctionnement de l'interface réseau nécessite un transfert HTTPS crypté.</li><li>Les requêtes API englobent une clé algorithmique HMAC-SHA256 couplée à l'horodatage pour étouffer d'anciennes attaques de répétitions de lecture d'entrée.</li><li>Le procédé formel opère au sein du bac à sable officiel macOS : les accès répertoire limitent l'interface unique et rigoureuse du choix individuel.</li><li>L'absence de faux piratage de données réside en l'association de l'authentification et signature standard HMAC vérifiée minutieusement contre d'obscures retouches.</li></ul>"
                        },
                        {
                                "h": "Vos droits",
                                "p": "<ul><li>Désinstallez votre accès au système applicatif pour voir disparaitre de votre Mac l'entièreté des codes et droits Keychain.</li><li>Réclamez en un message une ablation propre des résidus de CloudKit chez le développeur référent.</li><li>En tant que régulateur individuel vous devez faire part des actes liés au portefeuille digital sur la <a href='https://apps.apple.com/account/subscriptions' target='_blank'>Page unique d'utilisateur via Apple Subscriptions</a>.</li></ul>"
                        },
                        {
                                "h": "Composants Open Source",
                                "p": "<p>FormatRocket emploie les bibliothèques open-source suivantes uniquement et sans exception pour le traitement média natif individuel local. Elles ne collectent en aucun l'utilisation :</p><table><thead><tr><th>Bibliothèque</th><th>Licence</th><th>Objectif</th></tr></thead><tbody><tr><td>FFmpeg 7.1</td><td>LGPL 2.1+</td><td>Encodage/décodage de médias</td></tr><tr><td>libvpx</td><td>BSD 3-Clause</td><td>Codec vidéo VP8/VP9</td></tr><tr><td>libaom</td><td>BSD 2-Clause</td><td>Codec vidéo AV1</td></tr><tr><td>LAME</td><td>LGPL 2.0</td><td>Encodage MP3</td></tr><tr><td>libvorbis</td><td>BSD 3-Clause</td><td>Codec audio Ogg Vorbis</td></tr><tr><td>libopus</td><td>BSD 3-Clause</td><td>Codec audio Opus</td></tr><tr><td>libogg</td><td>BSD 3-Clause</td><td>Format de conteneur Ogg</td></tr><tr><td>libwebp</td><td>BSD 3-Clause</td><td>Modèle/Codec d'image WebP</td></tr><tr><td>XZ Utils</td><td>Domaine public</td><td>Compression LZMA</td></tr><tr><td>VMAF</td><td>BSD 2-Clause</td><td>Reconnaissance intégrée qualitative Vidéo</td></tr></tbody></table>"
                        },
                        {
                                "h": "Modifications de cette Politique de Confidentialité",
                                "p": "<p>Cette Politique de Confidentialité peut être mise à jour sans annonce de pré-requête chronologique ou de délais. Tout changement résolument établi et finalisé se trouve alors exposé sous peu de temps lors d'un téléchargement futur en plus de parutions formelles intra-muros sur la rubrique web désignée. Un simple geste en ouvrant à nouveau ses clics d'ordinateur approuve explicitement nos futures démarches de politiques de sécurités.</p>"
                        }
                ]
        },
        "es": {
                "backText": "Volver a la App",
                "title": "Política de Privacidad",
                "date": "Fecha de entrada en vigor: 25 de marzo de 2026 | Última actualización: 25 de marzo de 2026",
                "intro": "",
                "contactTitle": "Contacto",
                "contactText": "Si tiene alguna pregunta sobre esta Política de Privacidad, comuníquese a:",
                "websiteText": "Sitio Web:",
                "sections": [
                        {
                                "h": "Resumen",
                                "p": "<ul><li>Todas las conversiones de archivos se realizan localmente en tu Mac. Así, los archivos no se cargan nunca en ningún servidor.</li><li>No recopilamos ningún identificador personal como nombres, correos electrónicos ni teléfonos.</li><li>No integramos SDKs estadísticos de análisis, publicidad o rastreo de terceros.</li><li>Utilizamos Apple CloudKit para sincronizar tu cuota de uso y registros de invitaciones, validando en nuestros servidores independientes las compras y el límite de cuota.</li></ul>"
                        },
                        {
                                "h": "Datos Almacenados Localmente",
                                "p": "<p>Los siguientes datos se almacenan exclusivamente de manera individual y segura dentro de la máquina sin ser emitidos a la nube:</p><p><strong>Preferencias del Usuario</strong><br>Ajustes como idioma principal, carpeta de descarga o los colores temáticos recaen resguardados por el registro UserDefaults del sistema o \"sandbox\" perimetral de la propia Aplicación.</p><p><strong>Historial Tareas y Cargas</strong><br>Todos tus recientes logros (nombre del archivo y demás perfiles de conversión visual) terminan inscritos y cifrados internamente de la misma base de datos denominada SwiftData.</p><p><strong>Llavero (Keychain Storage)</strong><br>Además, se preserva esta lista delicada, hermética por encriptación totalizada macOS a modo Llavero:</p><ul><li>Tokens virtuales (Llave JWT).</li><li>Estatus de licencias y caché protector de membresía (Usando un protocolo seguro anti-falsificador o HMAC).</li><li>Matrícula cifrada de cada PC (Identificador UUID).</li><li>Derecho otorgado validable inicial.</li><li>Fichas obtenidas provenientes de regalos extra.</li></ul>"
                        },
                        {
                                "h": "Datos Transmitidos a Nuestro Servidor",
                                "p": "<p>La app y la pasarela <code>api.moringlabs.com</code> proceden interactuando conectadamente blindadas en HTTPS en materia transaccional junto al límite mensual o límite cuotas libres. El sistema completo contiene firma digitalizada (HMAC-SHA256).</p><p><strong>Validación Pagos (/auth/verify)</strong><br>Depositamos el comprobante del registro Apple Store (StoreKit ID), un número o sello irreconocible del aparato al servidor MoringLabs, asegurándonos también al cotejar ID iCloud que seas el mismo dueño formal del proceso original emitiendo así una credencial certificada.</p><p><strong>Refrescamiento / Pase Re-Validado (/auth/refresh)</strong><br>El re-intercambio requiere de reevaluación computacional (dispositivo oculto/iCloud id) dotándote de tiempo renovado si el plazo caduca.</p><p><strong>Reducción o Desplome Fichas Asignadas (/quota/consume)</strong><br>Comunicamos al programa sobre reducciones proporcionales al volumen transmutado gratuitamente.</p><p><strong>Sección Promociones Ocultas  (/invite/*)</strong><br>Cualquier canje en mención requiere comunicación con red para su debida gratificación y compensación contable en vivo.</p><p><strong>Sobre tu Marcador Serial Único de Computadora</strong><br>La base generadora es tu Serial Hardwarico codificado unilateralmente (Sistema Mac Hash-SHA256). Solo puede crearse el código final de salida pero el punto inverso jamás retornaría el documento original a sus hacedores.</p>"
                        },
                        {
                                "h": "Datos Sincronizados a través de Apple CloudKit",
                                "p": "<p>En paralelo con su apertura de la sesión de cuenta interna Apple Cloud(iCloud), Apple atesora la correspondencia enumerada aquí entre aparatos distintos si hay acceso:</p><ul><li><strong>Registros por Semanas</strong>: Número o techo límite al convertir (video/música) adicionándole variables de premio temporal.</li><li><strong>Promociones Propias</strong>: Su código para pasar compañeros y uso acumulativo junto a id iCloud.</li><li><strong>Cómputos Expansión Libre Compartida</strong>: Numerarias cuantificaciones a nivel semanal si difunde la marca entre los contactos a cambio de ventajas efímeras con sellos únicos temporizados (7 días).</li><li><strong>Bitácora Archivo de Respaldo Paga</strong>: Si la App y Cloudkit concuerdan sobre fechas activas, estado verificador e inscripción anual (Producto Identificador Oficial).</li><li><strong>Registro Timestamp Centralizada (Fecha Oficial)</strong>: Se rige al reloj atemporal verificador garantizando una barrera justa antemodificaciones si un tercero intercediese con fines espurios.</li></ul><p>Toda bitácora o log pertenece y es administrado bajo Apple Inc. Sus reglas las disponen dentro de su portal de la <a href='https://www.apple.com/es/privacy/' target='_blank'>Política de Apple Oficial</a>.</p>"
                        },
                        {
                                "h": "Compras In-App y Suscripciones",
                                "p": "<p>De la parte financiera nos declaramos incapaces de atesorarla debido al Apple StoreKit Versión 2. Esta App no recepta transferencias de fondos, ni tarjetas internacionales o billetera remota de usted. Identificamos en solitario que la pasarela emita y ratifique el ID pago del cobro transaccional a fechas determinadas del cliente y sus correspondientes devolutivos a fin de emitir el comprobante de pase Premium (Derecho adquirido por contrato base).</p>"
                        },
                        {
                                "h": "Propósito de los Datos",
                                "p": "<table><thead><tr><th>Campo Dato / Bitácora</th><th>Finalidad General </th></tr></thead><tbody><tr><td>Preferencias del Panel Básico Configuración</td><td>El guardado contante de sus clicks</td></tr><tr><td>Registros Cronológicos (Logs) Convertidor</td><td>Conocimiento rápido por averías pasadas e intenciones manual de repeticiones sin re-programación.</td></tr><tr><td>Hardware Hashing Hash</td><td>Gestación o creación de seriales sin exponerse la propiedad final del artefacto. </td></tr><tr><td>Credenciales a Certificar Digital</td><td>El ingreso seguro a nuestra plataforma Servidor.</td></tr><tr><td>Tasamiento Cuantitativo En Convertimientos Semanales</td><td>Una contención natural en masa (Restricción por Gratuidad).</td></tr><tr><td>Invitar Archivo Contabilidad</td><td>Insurrección sobre el conteo del regalado compensatorio. </td></tr><tr><td>Límite De Botón Destrabar Expansivo</td><td>Contención masiva temporal y cíclica en redes semanales</td></tr><tr><td>Memorización en caché interna Nivel-Pro</td><td>Autorización si ocurre un inoportuno desenlace o apagón (Offline Modus System!).</td></tr></tbody></table>"
                        },
                        {
                                "h": "Compartir Datos",
                                "p": "<p>Es imperativo esclarecer a nuestra base fiel consumidora no participar comercial, gratuitamente o indirectamente junto a asociaciones vendedoras (Cero exposición o reventa mercantil a corporativas masivas extrañas).</p><p>La presente App emite órdenes únicamente con las partes enumeradas:</p><ul><li><strong>api.moringlabs.com</strong>: Gestora Oficial encargada de vigilar nuestros derechos y pautas. (Empresarial Directo MoringLabs. Inc Server).</li><li><strong>Apple CloudKit</strong>: Sistema natural o raíz sobre base remota a sincronía de promociones gratuitas o pases (Apple).</li><li><strong>Apple StoreKit</strong>: Sistema legal sobre caja facturero oficial transacciones(Cajero Internacional de Licenciamientos).</li></ul>"
                        },

                "sections": [
                        {
                                "h": "Resumo",
                                "p": "<ul><li>Todas as conversões de arquivos ocorrem localmente no seu Mac. Os seus arquivos nunca são enviados a nenhum servidor.</li><li>Não coletamos identificadores pessoais, tais como nome, endereço de e-mail ou número de telefone.</li><li>Não integramos SDKs de análise, publicidade ou rastreamento de terceiros.</li><li>Utilizamos o Apple CloudKit para sincronizar a sua cota de utilização e registos de convites, bem como o nosso próprio servidor para verificar compras e cotas.</li></ul>"

                        {
                                "h": "Dados Armazenados Localmente",
                                "p": "<p>Os seguintes dados são armazenados exclusivamente no seu dispositivo e nunca são transmitidos para qualquer servidor:</p><p><strong>Preferências do Usuário</strong><br>Definições como idioma, diretórios de saída, parâmetros de conversão e temas de interface são salvos em UserDefaults, na sandbox do Aplicativo.</p><p><strong>Registros de Tarefas de Conversão</strong><br>O histórico de tarefas (nomes de arquivos, status, marcações de tempo e parâmetros) é guardado numa base de dados SwiftData local.</p><p><strong>Armazenamento nas Chaves (Keychain)</strong><br>Os seguintes dados sensíveis são criptografados e armazenados de forma segura mediante as Chaves do macOS:</p><ul><li>Tokens de autenticação (JWT)</li><li>Cache de nível de opções compradas (com assinaturas HMAC para impedir alterações)</li><li>Identificadores do dispositivo (UUID)</li><li>Estado do resgate da cota inicial</li><li>Registros de resgate de códigos de convite</li></ul>"

                                "h": "Dados Transmitidos para o Nosso Servidor",
                                "p": "<p>O Aplicativo se comunica com <code>api.moringlabs.com</code> via HTTPS para verificação das compras e gerenciamento de cotas. Para evitar falsificações, todas as solicitações incluem uma assinatura HMAC-SHA256.</p><p><strong>Verificação da Compra (/auth/verify)</strong><br>Transmitimos o ID da transação StoreKit, um identificador com hash do dispositivo e o seu ID de usuário iCloud a fim de confirmar a legitimidade da sua compra pela App Store em nosso servidor, emitindo o respectivo token de autenticação.</p><p><strong>Renovação de Token (/auth/refresh)</strong><br>Submetemos o identificador de dispositivo em hash e o ID do iCloud para atualizar um token de autenticação vencido.</p><p><strong>Dedução da Cota (/quota/consume)</strong><br>Enviamos o tipo de conversão (vídeo/áudio/imagem) e a quantia para deduzir da cota semanal do usuário gratuito no servidor.</p><p><strong>Códigos de Convite (/invite/*)</strong><br>Enviamos ou recebemos códigos de convite para gerar, registrar e resgatar recompensas.</p><p><strong>Nota Sobre o Identificador do Dispositivo</strong><br>O identificador do dispositivo é gerado por um hash SHA256 do número de série do seu hardware Mac. Esse é um hash irreversível e unidirecional, que não pode ser convertido de volta ou rastreado até as informações originais do hardware.</p>"

            document.getElementById('nav-back-text').innerText = data.backText;
            document.getElementById('mainTitle').innerText = data.title;

            const introElem = document.getElementById('introText');
            // 根据翻译对象中的 intro 字段是否为空来决定是否显示简介容器（避免空占位影响布局）
            if (data.intro && data.intro.trim() !== "") {
                introElem.innerText = data.intro;
                introElem.style.display = 'block';
            } else {
                introElem.style.display = 'none';
            }
            
            document.getElementById('contactTitle').innerText = data.contactTitle;
            document.getElementById('contactText').innerText = data.contactText;
            document.getElementById('websiteText').innerText = data.websiteText;
            
            const container = document.getElementById('content-container');
            container.innerHTML = '';
            
            data.sections.forEach(section => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <h2 class="text-xl md:text-2xl font-bold text-gray-900 mb-4 tracking-tight">${section.h}</h2>
                    <div class="prose-custom text-base md:text-lg">${section.p}</div>
                `;
                container.appendChild(div);
            });
        }

        // Language Switcher Logic
        function switchLang(langCode) {
            localStorage.setItem('formatrocket_lang', langCode);
            updateUI(langCode);
        }

        // Init
        window.onload = function() {
            const savedLang = localStorage.getItem('formatrocket_lang') || 'en';
            const finalLang = translations[savedLang] ? savedLang : 'en';
            
            const selector = document.getElementById('langSelector');
            if(selector.querySelector(`option[value="${finalLang}"]`)) {
                selector.value = finalLang;
            }
            
            updateUI(finalLang);
            setTimeout(() => document.querySelector('main.animate-fade-in').classList.add('opacity-100'), 100);
        }
    </script>
</body>
</html>
