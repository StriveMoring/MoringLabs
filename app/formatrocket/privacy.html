        /* 核心修复：单纯锁死视口宽度，绝对不碰颜色 */
        html, body { 
            overflow-x: hidden;
            width: 100vw;
            max-width: 100%;
        }
        
        /* 视觉渲染：把背景色和字体只交还给 body，恢复透明穿透机制 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;

        .ambient-glow {
            position: absolute; 
            width: 1200px; 
            height: 1200px;
            background: radial-gradient(circle, rgba(64,156,255,0.08) 0%, rgba(255,255,255,0) 70%);
            top: -300px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: -1; 
            pointer-events: none;
        }

        .bento-card {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
        }

        @keyframes fade-in-up { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* 针对长文本内容的定制排版样式 */
        .prose-custom { color: #6b7280; line-height: 1.7; }
        .prose-custom p { margin-bottom: 1.25rem; }
        .prose-custom h3 { font-size: 1.125rem; font-weight: 700; color: #1f2937; margin-top: 2rem; margin-bottom: 0.75rem; }
        .prose-custom ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 1.25rem; }
        .prose-custom li { margin-bottom: 0.5rem; }
        .prose-custom strong { color: #374151; font-weight: 600; }
        .prose-custom a { color: #3b82f6; text-decoration: none; }
        .prose-custom a:hover { text-decoration: underline; }
        .prose-custom table { width: 100%; border-collapse: collapse; margin-top: 1.25rem; margin-bottom: 1.5rem; font-size: 0.875rem; }
        @media (min-width: 768px) { .prose-custom table { font-size: 0.95rem; } }
        .prose-custom th, .prose-custom td { border: 1px solid #e5e7eb; padding: 0.75rem 1rem; text-align: left; vertical-align: top; }
        .prose-custom th { background-color: #f9fafb; font-weight: 600; color: #111827; }
        .prose-custom tr:nth-child(even) { background-color: #fcfcfd; }
    </style>

    <script>
        const translations = {
        "en": {
                "backText": "Back to App",
                "title": "Privacy Policy",
                "contactTitle": "Contact Us",
                "contactText": "If you have any questions about this Privacy Policy, please contact us at:",
                "sections": [
                        {
                                "h": "Summary",
                                "p": "<ul><li>All file conversions are processed locally on your Mac. Your files are never uploaded to any server.</li><li>We do not collect personally identifiable information such as your name, email, or phone number.</li><li>We do not integrate any third-party analytics, advertising, or tracking SDKs.</li><li>We use Apple CloudKit to sync your usage quota and invite records, and our proprietary server to verify purchases and manage quotas.</li></ul>"
                        },
                        {
                                "h": "Data Stored Locally",
                                "p": "<p>The following data is stored exclusively on your device and is never transmitted to any server:</p><p><strong>User Preferences</strong><br>Settings such as language, output directory, conversion parameters, and UI themes are saved within the App sandbox using UserDefaults.</p><p><strong>Conversion Task Records</strong><br>Task history (including file names, status, timestamps, and parameters) is stored in a local SwiftData database.</p><p><strong>Keychain Storage</strong><br>The following sensitive data is encrypted and securely stored using the macOS Keychain:</p><ul><li>Authentication tokens (JWT)</li><li>Entitlement tier cache (with HMAC signatures to prevent tampering)</li><li>Device identifiers (UUID)</li><li>Initial quota claim status</li><li>Invite code redemption records</li></ul>"
                        },
                        {
                                "h": "Free Users: Server Quota Management",
                                "p": "<p>Free tier users receive a fixed number of conversions per week. To accurately manage this quota, the App communicates with <code>api.moringlabs.com</code> via HTTPS. All requests include an HMAC-SHA256 signature and a timestamp to prevent forgery and replay attacks.</p><p>The following server communication is <strong>strictly for managing quotas of free users</strong>:</p><p><strong>Quota Deduction</strong><br>For each conversion, the conversion type (video/audio/image) and amount are submitted, and the server synchronously deducts the remaining weekly quota.</p><p><strong>Invite Codes</strong><br>Invite codes can be submitted or received to generate and redeem invite rewards. Free users can earn additional conversion quotas by inviting friends.</p><p><strong>Purchase Verification</strong><br>When upgrading to a paid tier, your StoreKit transaction ID is submitted to our server to verify its legitimacy. Upon successful verification, an authentication token is issued, and quota deductions cease.</p><p><strong>Token Refresh</strong><br>Authentication tokens are periodically refreshed to synchronize entitlement status.</p><p><strong>Transmitted Identifiers</strong><br>The requests mentioned above include a device identifier hash and your iCloud User ID. The device identifier is generated using a SHA256 hash of your Mac's hardware serial number, creating an irreversible, one-way hash that cannot be traced back to the original hardware information.</p>"
                        },
                        {
                                "h": "Paid Users: Apple Complete Management",
                                "p": "<p>Subscriptions and purchases for paid users (Pro / Ultimate) are processed entirely by Apple via StoreKit 2. The App does not receive or store any payment information, Apple IDs, or financial data.</p><p>Paid users are not subject to weekly conversion limits, and the App does not send quota deduction requests to our servers on their behalf. Sever communication only occurs briefly during purchase verification and token refreshing to confirm the entitlement tier, without any tracking or logging of usage behavior.</p><p>Lifetime license users (Pro Lifetime / Ultimate) will never lose their entitlements even when completely offline, as the entitlement status remains permanently valid through a locally signed cache.</p>"
                        },
                        {
                                "h": "Data Synced via Apple CloudKit",
                                "p": "<p>When signed into iCloud, the following data is synced via Apple CloudKit, <strong>primarily to facilitate quota management for free users</strong>:</p><ul><li><strong>Weekly Conversion Quota</strong>: The remaining operations for video, audio, and image conversions for the current week, plus any bonus quotas.</li><li><strong>Invite Code Records</strong>: Your invite code, its usage count, and the iCloud User IDs of the inviter and invitee.</li><li><strong>Share-to-Unlock Records</strong>: The share count for the current week and the weekly identifier.</li><li><strong>Server Timestamps</strong>: Used to determine the current calendar week for quota resets, preventing limit bypasses by manipulating the local system clock.</li></ul><p>For paid users, CloudKit data only retains a backup of the purchase status (Product ID, activation status) and does not log any conversion activities.</p><p>CloudKit data is stored on Apple's infrastructure and is governed by <a href='https://www.apple.com/privacy/' target='_blank'>Apple's Privacy Policy</a>.</p>"
                        },
                        {
                                "h": "How We Use Data",
                                "p": "<table><thead><tr><th>Data</th><th>Purpose</th></tr></thead><tbody><tr><td>Local Preferences</td><td>Restore settings between sessions</td></tr><tr><td>Conversion Task Records</td><td>Display task status and enable retries</td></tr><tr><td>Hashed Device Identifier</td><td>Generate invite codes and verify device binding</td></tr><tr><td>Authentication Token</td><td>Authenticate server API requests</td></tr><tr><td>Weekly Conversion Quota</td><td>Enforce limits for free users</td></tr><tr><td>Invite Code Records</td><td>Verify invites and issue rewards</td></tr><tr><td>Share-to-Unlock Count</td><td>Limit weekly sharing attempts</td></tr><tr><td>Entitlement Tier Cache</td><td>Determine available features while offline</td></tr></tbody></table>"
                        },
                        {
                                "h": "Data Sharing",
                                "p": "<p>We do not sell, rent, or disclose user data to any third parties.</p><p>The App only communicates with the following external services:</p><ul><li><strong>api.moringlabs.com</strong>: For purchase verification and quota management (developer's proprietary server)</li><li><strong>Apple CloudKit</strong>: For quota synchronization and invite records</li><li><strong>Apple StoreKit</strong>: For processing in-app purchases and subscriptions</li></ul>"
                        },
                        {
                                "h": "Data Retention and Deletion",
                                "p": "<ul><li><strong>Local Data</strong>: Preferences, task records, and Keychain items are automatically cleared when you delete the App. You can also manually remove them by deleting <code>~/Library/Application Support/com.moring.FormatRocket</code> and the relevant entries in Keychain Access.</li><li><strong>CloudKit Data</strong>: Retained in your iCloud account. You may request its deletion by signing out of iCloud or contacting the developer.</li><li><strong>Server Data</strong>: Hashed device identifiers and quota records are securely retained on our server. Contact the developer to request deletion.</li><li><strong>Conversion Output Files</strong>: Saved in your designated directory and managed entirely by you.</li></ul>"
                        },
                        {
                                "h": "Data Security",
                                "p": "<ul><li>Sensitive data (tokens, entitlement status, device identifiers) is encrypted and stored in the macOS Keychain.</li><li>All network communications are securely transmitted via HTTPS.</li><li>API requests are protected against replay attacks and forgery using HMAC-SHA256 signatures and timestamps.</li><li>The App operates strictly within the macOS Sandbox, limiting file access to directories explicitly authorized by the user.</li><li>The entitlement cache utilizes HMAC signature validation to prevent local tampering.</li></ul>"
                        },
                        {
                                "h": "Your Rights",
                                "p": "<ul><li>Deleting the App permanently removes all associated local data and Keychain entries.</li><li>You can contact the developer to request the deletion of related data stored on CloudKit and our server.</li><li>To manage your subscriptions, please visit the <a href='https://apps.apple.com/account/subscriptions' target='_blank'>Apple Subscription Management Page</a>.</li></ul>"
                        },
                        {
                                "h": "Open Source Components",
                                "p": "<p>FormatRocket integrates the following open-source libraries solely for local media processing, which neither collect nor transmit any data:</p><table><thead><tr><th>Library</th><th>License</th><th>Purpose</th></tr></thead><tbody><tr><td>FFmpeg 7.1</td><td>LGPL 2.1+</td><td>Media encoding/decoding</td></tr><tr><td>libvpx</td><td>BSD 3-Clause</td><td>VP8/VP9 video codec</td></tr><tr><td>libaom</td><td>BSD 2-Clause</td><td>AV1 video codec</td></tr><tr><td>LAME</td><td>LGPL 2.0</td><td>MP3 encoding</td></tr><tr><td>libvorbis</td><td>BSD 3-Clause</td><td>Ogg Vorbis audio codec</td></tr><tr><td>libopus</td><td>BSD 3-Clause</td><td>Opus audio codec</td></tr><tr><td>libogg</td><td>BSD 3-Clause</td><td>Ogg container format</td></tr><tr><td>libwebp</td><td>BSD 3-Clause</td><td>WebP image codec</td></tr><tr><td>XZ Utils</td><td>Public Domain</td><td>LZMA compression</td></tr><tr><td>VMAF</td><td>BSD 2-Clause</td><td>Video quality assessment</td></tr></tbody></table>"
                        },
                        {
                                "h": "Privacy Policy Changes",
                                "p": "<p>This Privacy Policy may be updated periodically. Any changes will be published within the App and on our official website. Continued use of the App constitutes your acceptance of the updated policy.</p>"
                        }
                ]
        },
        "zh-CN": {
                "backText": "返回应用",
                "title": "隐私政策",
                "contactTitle": "联系我们",
                "contactText": "如对本隐私政策有任何疑问，请通过以下方式联系我们：",
                "sections": [
                        {
                                "h": "概要",
                                "p": "<ul><li>所有文件转换均在本地 Mac 上完成，文件内容不会上传至任何服务器。</li><li>不收集姓名、邮箱、电话等个人身份信息。</li><li>不集成任何第三方分析、广告或追踪 SDK。</li><li>使用 Apple CloudKit 同步使用额度与邀请记录，使用自有服务端验证购买与配额。</li></ul>"
                        },
                        {
                                "h": "本地存储的数据",
                                "p": "<p>以下数据仅保存在本机，不会传输至任何服务器：</p><p><strong>用户偏好设置</strong><br>语言、输出目录、转换参数、界面主题等配置项，保存在应用沙箱内的 UserDefaults 中。</p><p><strong>转换任务记录</strong><br>任务历史（文件名、状态、时间戳、转换参数）保存在本地 SwiftData 数据库中。</p><p><strong>钥匙串存储</strong><br>以下敏感数据通过 macOS 钥匙串加密存储：</p><ul><li>认证令牌（JWT）</li><li>权益等级缓存（含 HMAC 签名防篡改）</li><li>设备标识符（UUID）</li><li>首次额度领取状态</li><li>邀请码兑换记录</li></ul>"
                        },
                        {
                                "h": "免费用户：服务端配额管理",
                                "p": "<p>免费版用户每周有固定的转换次数限额。为准确管理该额度，应用通过 HTTPS 与 <code>api.moringlabs.com</code> 通信。所有请求均附带 HMAC-SHA256 签名和时间戳，防止伪造和重放。</p><p>以下服务端通信<strong>仅针对免费用户的配额管理</strong>：</p><p><strong>配额扣减</strong><br>每次转换时提交转换类型（视频/音频/图片）和数量，由服务端同步扣减当周剩余额度。</p><p><strong>邀请码相关</strong><br>提交或接收邀请码，用于邀请奖励的生成与兑换。免费用户可通过邀请好友获得额外转换次数。</p><p><strong>购买验证</strong><br>用户升级到付费版本时，提交 StoreKit 交易 ID 至服务端验证购买合法性。验证通过后签发认证令牌，此后不再进行配额扣减。</p><p><strong>令牌刷新</strong><br>定期刷新认证令牌以同步权益状态。</p><p><strong>传输的标识信息</strong><br>上述请求中包含设备标识哈希值和 iCloud 用户 ID。设备标识通过 macOS 硬件序列号的 SHA256 哈希生成，为不可逆的单向哈希值，无法还原为原始硬件信息。</p>"
                        },
                        {
                                "h": "付费用户：Apple 全权管理",
                                "p": "<p>付费用户（Pro / Ultimate）的订阅与购买完全由 Apple 通过 StoreKit 2 处理。应用不接收也不存储任何支付信息、Apple ID 或财务数据。</p><p>付费用户不受周转换额度限制，应用不会为其向服务端发送配额扣减请求。服务端仅在购买验证和令牌刷新时短暂通信，用于确认权益等级，不涉及使用行为的追踪或记录。</p><p>买断制用户（Pro Lifetime / Ultimate）即使完全离线也不会失去权益，权益状态通过本地签名缓存永久有效。</p>"
                        },
                        {
                                "h": "通过 Apple CloudKit 同步的数据",
                                "p": "<p>登录 iCloud 后，以下数据通过 Apple CloudKit 服务同步，<strong>主要服务于免费用户的额度管理</strong>：</p><ul><li><strong>周转换额度</strong>：当前周的视频、音频、图片剩余转换次数及奖励额度。</li><li><strong>邀请码记录</strong>：邀请码、使用次数、邀请人与受邀人的 iCloud 用户 ID。</li><li><strong>分享解锁记录</strong>：本周分享次数及周标识符。</li><li><strong>服务器时间戳</strong>：用于确定当前日历周以重置额度，防止通过修改本地时钟绕过限制。</li></ul><p>付费用户的 CloudKit 数据仅保留购买状态备份（产品 ID、激活状态），不记录转换行为。</p><p>CloudKit 数据存储在 Apple 基础设施中，受 <a href='https://www.apple.com/privacy/' target='_blank'>Apple 隐私政策</a> 约束。</p>"
                        },
                        {
                                "h": "数据用途",
                                "p": "<table><thead><tr><th>数据</th><th>用途</th></tr></thead><tbody><tr><td>本地偏好设置</td><td>在会话之间恢复设置</td></tr><tr><td>转换任务记录</td><td>显示任务状态，支持重试</td></tr><tr><td>设备标识哈希</td><td>生成邀请码、设备绑定验证</td></tr><tr><td>认证令牌</td><td>服务端接口鉴权</td></tr><tr><td>周转换额度</td><td>免费用户额度限制</td></tr><tr><td>邀请码记录</td><td>验证邀请并发放奖励</td></tr><tr><td>分享解锁计数</td><td>每周分享次数限制</td></tr><tr><td>权益等级缓存</td><td>离线时确定可用功能</td></tr></tbody></table>"
                        },
                        {
                                "h": "数据共享",
                                "p": "<p>不会向任何第三方出售、出租或披露用户数据。</p><p>应用仅与以下外部服务通信：</p><ul><li><strong>api.moringlabs.com</strong>：购买验证与配额管理（开发者自有服务端）</li><li><strong>Apple CloudKit</strong>：额度同步与邀请记录</li><li><strong>Apple StoreKit</strong>：内购与订阅处理</li></ul>"
                        },
                        {
                                "h": "数据保留与删除",
                                "p": "<ul><li><strong>本地数据</strong>：偏好设置、任务记录、钥匙串项在删除应用后自动清除。也可通过手动删除 <code>~/Library/Application Support/com.moring.FormatRocket</code> 和钥匙串中的相关条目进行清理。</li><li><strong>CloudKit 数据</strong>：保留在 iCloud 账户中。退出 iCloud 登录或联系开发者可请求删除。</li><li><strong>服务端数据</strong>：设备标识哈希和配额记录保存在服务端。联系开发者可请求删除。</li><li><strong>转换输出文件</strong>：保存在用户指定的目录中，由用户自行管理。</li></ul>"
                        },

                                "h": "무료 사용자: 서버 기반 할당량 관리",
                                "p": "<p>무료 등급 사용자는 매주 고정된 횟수의 변환 한도를 받게 됩니다. 이를 정확하게 관리하기 위해, 앱은 HTTPS를 통해 <code>api.moringlabs.com</code>과 통신합니다. 모든 요청에는 위조 및 리플레이 공격을 막기 위한 HMAC-SHA256 서명과 타임스탬프가 포함됩니다.</p><p>다음의 서버 통신은 <strong>무료 사용자의 할당량 관리를 목적으로만</strong> 엄격히 수행됩니다:</p><p><strong>할당량 차감</strong><br>변환마다 종류(비디오/오디오/이미지) 및 수량을 서버로 전송하며, 서버가 즉각적으로 이번 주 남은 잔여분을 실시간으로 차감합니다.</p><p><strong>초대 코드 관련</strong><br>초대 보상을 생성하고 등록 및 적용하기 위해 초대 코드를 발송하거나 수신합니다. 친구를 초대하면 무료 사용자는 추가 변환 횟수를 획득할 수 있습니다.</p><p><strong>구매 확인 검증</strong><br>유료 버전으로 업그레이드할 때, 구매의 진위 여부를 확인하기 위해 StoreKit의 거래 ID가 서버에 제출됩니다. 인증 심사가 승인되면 인증 토큰이 발행되며 그 시점부터 더 이상 할당량 차감이 요구되지 않습니다.</p><p><strong>토큰 갱신</strong><br>권한 상태를 지속적으로 동기화하기 위해 인증 토큰을 주기적으로 갱신합니다.</p><p><strong>전송되는 식별 정보</strong><br>위 명시된 요청 항목에는 기기 식별 해시값과 귀하의 iCloud 사용자 ID가 포함되어 있습니다. 단일 기기 식별자는 Mac의 하드웨어 일련 번호를 바탕으로 한 SHA256 해시를 통해 생성되며, 이는 역으로 원래의 하드웨어 정보를 절대로 알아낼 수 없는 단방향의 비가역적 해시값입니다.</p>"

                                "h": "Datos en su Dispositivo",
                                "p": "<p>Toda manipulación de la siguiente memoria reside enteramente en los dominios de su dispositivo local:</p><p><strong>Opciones Preferenciales</strong><br>La personalización íntegra (idiomas, menús de interfaz y ubicación final) son retenidas de forma pasiva por el UserDefaults contenido en las barreras del Sandboxing.</p><p><strong>Gestión en Memoria de Las Tareas</strong><br>Cada acción pasada o fallida, su archivo adscrito y la métrica referencial se refugia estáticamente en un almacén lógico basado en SwiftData para recuperar rápidamente lo inacabado.</p><p><strong>Coraza y Llavero Lógico (Keychain)</strong><br>Para elementos crípticos y sensibles, nada abandona su Llavero (Keychain):</p><ul><li>Llaves credenciales JWT e información intrínseca</li><li>Validación HMAC ante la potencial amenaza de software no éticos de sustracción</li><li>Nombres numéricos aleatorizados para el Hardware que la rige (UUID)</li><li>Fiducia y el saldo final del canje promocional de recomendación</li></ul>"

        function updateUI(langCode) {
            const data = translations[langCode] || translations['en'];
            
            document.title = data.title + " | FormatRocket";
            document.getElementById('nav-back-text').innerText = data.backText;
            document.getElementById('mainTitle').innerText = data.title;

            const introElem = document.getElementById('introText');
            // 根据翻译对象中的 intro 字段是否为空来决定是否显示简介容器（避免空占位影响布局）
            if (data.intro && data.intro.trim() !== "") {
                introElem.innerText = data.intro;
                introElem.style.display = 'block';
            } else {
                introElem.style.display = 'none';
            }
            
            document.getElementById('contactTitle').innerText = data.contactTitle;
            document.getElementById('contactText').innerText = data.contactText;

            
            const container = document.getElementById('content-container');
            container.innerHTML = '';
            
            data.sections.forEach(section => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <h2 class="text-xl md:text-2xl font-bold text-gray-900 mb-4 tracking-tight">${section.h}</h2>
                    <div class="prose-custom text-base md:text-lg">${section.p}</div>
                `;
                container.appendChild(div);
            });
        }

        // Language Switcher Logic
        function switchLang(langCode) {
            localStorage.setItem('moring_lang', langCode);
            updateUI(langCode);
        }

        // Init
        window.onload = function() {
            const savedLang = localStorage.getItem('moring_lang') || 'en';
            const finalLang = translations[savedLang] ? savedLang : 'en';
            
            const selector = document.getElementById('langSelector');
            if(selector.querySelector(`option[value="${finalLang}"]`)) {
                selector.value = finalLang;
            }
            
            updateUI(finalLang);
            setTimeout(() => document.querySelector('main.animate-fade-in').classList.add('opacity-100'), 100);
        }
    </script>
