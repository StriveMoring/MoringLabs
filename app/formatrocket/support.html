    <style>
        /* 引入彻底本地化的 Inter 字体，确保从根目录加载所有 woff2 文件 */
        @import url('/assets/css/inter.css');

        html,
        body {
            overflow-x: hidden;
            width: 100vw;
            max-width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background-color: #fbfbfd;
            color: #1d1d1f;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .ambient-glow {
            position: absolute;
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(64, 156, 255, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            top: -300px;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
            pointer-events: none;
        }

        .bento-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
            border-radius: 2rem;
        }

        @media (min-width: 768px) {
            .bento-card {
                border-radius: 2.5rem;
            }
        }

        .bento-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        /* Ultimate 卡片专属的高级暗黑样式 */
        .bento-card.ultimate-card {
            background: #111827;
            /* Tailwind gray-900 */
            border: 1px solid #1f2937;
        }

        .bento-card.ultimate-card:hover {
            border-color: #374151;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.3);
        }

        /* FAQ 动画样式 */
        .faq-answer {
            display: none;
        }

        .faq-item.active .faq-answer {
            display: block;
            animation: fadeIn 0.4s ease-in-out;
        }

        .faq-item.active .fa-chevron-down {
            transform: rotate(180deg);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in-up {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

                            { q: "Я ненавижу систему подписок. Предусмотрена ли у вас опция 'пожизненной покупки' одним платежом?", a: "Безусловно! Наша команда презирает методы принудительного навязывания периодических снятий абонентской платы. Именно поэтому с великой гордостью мы оставляем кристально прозрачные условия для одномоментных (разовых) бессрочных приобретений, которые навсегда закрепят за вами статус владельца приложения со всеми будущими обновлениями: это тарифный план <strong>Пожизненный Pro</strong> (всего $39.99), или же наш флагманский продукт премиум-класса — версия <strong>Ultimate</strong> ($79.99) которая предоставляется вам также на всю оставшуюся жизнь." },
                            { q: "А для чего предназначен Инструмент Командной Строки (CLI)?", a: "Приобретая Ultimate лицензию, вы разблокируете доступ к скрытому в недрах программы мощнейшему терминальному интерфейсу, известному как <code>frcli</code>. Если вы не любите кликать мышкой по графическим кнопочкам, то вы можете зайти в стандартное системное приложение 'Терминал' и выполнить текстовую команду вроде: <code>frcli convert input.mkv -o output.mp4</code> и конвертация начнется из-под капота. Помимо ручной работы, это означает, что отныне вы сможете полностью автоматизировать свои процессы интегрируя эти команды в приложение 'Команды (Shortcuts)' или же написав собственный скрипт, который будет следить за вашей папкой и без вашего ведома автоматически конвертировать любые файлы, что вы туда положите." }
                        ]
                    }
                ],
                specsTitle: "Возможности приложения",
                specs: { os: "ОС не ниже macOS 14.0", chip: "Полноценная архитектура Apple Silicon, а также Intel", limits: "В зависимости от приобретенной версии", net: "Работает абсолютно без сети интернет (100% Offline режим)" },
                contactTitle: "У вас все еще не решены возникшие проблемы?",
                contactText: "Команда технической поддержки завжди готова к диалогу и с радостью ответит на все ваши технические запросы в кратчайшие сроки."
            }
        };

        // 渲染核心逻辑 updateUI
        function updateUI(langCode) {
            // 回退逻辑：如果某语言数据为 null 或者 undefined，则自动转为英文。
            const safeData = translations[langCode] || translations['en'];

            // 更新静态主文本
            document.getElementById('nav-back-text').innerText = safeData.backText;
            document.getElementById('mainTitle').innerText = safeData.mainTitle;
            document.getElementById('subTitle').innerText = safeData.subTitle;
            document.getElementById('specsTitle').innerText = safeData.specsTitle;
            document.getElementById('contactTitle').innerText = safeData.contactTitle;
            document.getElementById('contactText').innerText = safeData.contactText;

            // 1. 渲染顶部导航网格（Bento 卡片锚点入口）
            const guidesGrid = document.getElementById('guidesGrid');
            guidesGrid.innerHTML = safeData.categories.map((cat) => {
                const titleColor = "text-gray-900";
                const descColor = "text-gray-500 text-sm md:text-base leading-relaxed";
                const iconWrapper = `bg-gray-50 text-gray-600 border-gray-100`;

                return `
                <a href="#${cat.id}" class="bento-card p-6 md:p-8 flex flex-col h-full block group cursor-pointer bg-white no-underline">
                    <div class="w-12 h-12 md:w-14 md:h-14 rounded-xl md:rounded-2xl flex items-center justify-center mb-5 md:mb-6 shadow-sm border border-gray-100 flex-shrink-0 transition-transform group-hover:scale-110 duration-300 ${iconWrapper}">
                        <i class="fas fa-${cat.icon} text-xl md:text-2xl"></i>
                    </div>
                    <h2 class="text-xl md:text-2xl font-bold mb-2 tracking-tight ${titleColor}">${cat.title}</h2>
                    <p class="${descColor} mt-auto">${cat.desc}</p>
                </a>`;
            }).join('');

            // 2. 渲染下方具体的帮助分类详情区块 +手风琴互动
            const catsContainer = document.getElementById('helpCategoriesContainer');
            catsContainer.innerHTML = safeData.categories.map((cat) => {
                const itemsHtml = cat.items.map((item) => `
                    <div class="faq-item bento-card overflow-hidden cursor-pointer bg-white" onclick="this.classList.toggle('active')">
                        <div class="px-5 md:px-8 py-3 md:py-4 flex justify-between items-center font-bold text-gray-900 text-base md:text-lg">
                            <span class="pr-4 leading-tight">${item.q}</span> 
                            <i class="fas fa-chevron-down text-gray-400 transition-transform duration-300 text-sm md:text-base flex-shrink-0"></i>
                        </div>
                        <div class="faq-answer px-5 md:px-8 pb-4 md:pb-5 text-gray-700 border-t border-gray-50 pt-3 text-sm md:text-base leading-normal font-normal">
                            ${item.a}
                        </div>
                    </div>
                `).join('');

                return `
                <div id="${cat.id}" class="pt-24 -mt-24"> <!-- pt-24 修正锚点滚动被固定导航栏遮挡问题 -->
                    <div class="flex items-center gap-3 mb-4 md:mb-6 pl-2">
                         <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-gray-50 border border-gray-100 text-gray-600 shadow-sm">
                             <i class="fas fa-${cat.icon} text-sm"></i>
                         </div>
                         <h2 class="text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">${cat.title}</h2>
                    </div>
                    <div class="space-y-2 max-w-4xl mx-auto pl-2 pr-2 md:pl-0 md:pr-0">
                        ${itemsHtml}
                    </div>
                </div>`;
            }).join('');

            // 3. 渲染底部的系统规格卡片 (Specs Grid)
            const specGrid = document.getElementById('specsGrid');
            const icons = { os: 'desktop', chip: 'microchip', limits: 'tachometer-alt', net: 'shield-alt' };
            specGrid.innerHTML = Object.entries(safeData.specs).map(([key, val]) => `
                <div class="text-center md:text-left">
                    <div class="text-gray-400 mb-1 md:mb-2 flex items-center justify-center md:justify-start text-xs md:text-sm tracking-wider font-semibold">
                        <i class="fas fa-${icons[key]} mr-1 md:mr-2 text-gray-500"></i> ${key.toUpperCase()}
                    </div>
                    <div class="font-bold text-lg md:text-xl">${val}</div>
                </div>
            `).join('');
        }

        // 语言切换与存储功能
        function switchLang(langCode) {
            localStorage.setItem('formatrocket_lang', langCode);
            updateUI(langCode);
        }

        // 页面初始化逻辑
        window.onload = function () {
            const savedLang = localStorage.getItem('formatrocket_lang') || 'en';
            // 验证语言是否有效，处理未完全翻译退回英语
            const finalLang = (translations[savedLang] && translations[savedLang] !== null) ? savedLang : 'en';

            const selector = document.getElementById('langSelector');
            if (selector.querySelector(`option[value="${finalLang}"]`)) {
                selector.value = finalLang;
            }

            // 初始化渲染界面
            updateUI(finalLang);
            // 延时加载平滑呈现动画
            setTimeout(() => document.querySelector('main.animate-fade-in').classList.add('opacity-100'), 50);
        }
    </script>
</body>

</html>
