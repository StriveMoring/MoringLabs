        const TOTAL_CARDS = 13;
        const container = document.getElementById('cards-container');
        
        let initialCardsHTML = '';
        for (let i = 1; i <= TOTAL_CARDS; i++) {
            let colSpanClass = "";
            if (i === 1) colSpanClass = "md:col-span-2"; // Make the first one span full width
            initialCardsHTML += `
                <div class="bento-card rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-8 flex flex-col ${colSpanClass}">
                    <div class="mb-6 md:mb-8"><h3 id="feat-title-${i}" class="text-xl md:text-2xl font-bold text-gray-900 mb-2 tracking-tight"></h3><p id="feat-desc-${i}" class="text-base md:text-lg text-gray-500 font-medium leading-relaxed"></p></div>
                    <div class="relative w-full aspect-[16/10] bg-gray-50 rounded-[1.5rem] md:rounded-3xl overflow-hidden border border-gray-100 flex items-center justify-center shadow-inner cursor-zoom-in" onclick="openModal(document.getElementById('shot-${i}').src)">
                        <div id="skeleton-${i}" class="absolute inset-0 bg-gray-200 skeleton-pulse"></div>
                        <img id="shot-${i}" src="" class="w-full h-full object-cover relative z-10 img-transition opacity-0" alt="App Screenshot ${i}">
                    </div>
                </div>
            `;
        }
        container.innerHTML = initialCardsHTML;

        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');

        function openModal(src) {
            if(!src) return; modalImg.src = src; modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.add('opacity-100'); modalImg.classList.add('scale-100'); modalImg.classList.remove('scale-90'); }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('opacity-100'); modalImg.classList.add('scale-90'); modalImg.classList.remove('scale-100');
            setTimeout(() => { modal.classList.add('hidden'); document.body.style.overflow = ''; }, 400);
        }

        function updateUI(lang) {
            const fLang = INFO.langMap[lang] || "en-US";
            const data = TEXTS[lang] || TEXTS['en'];
            document.getElementById('appName').innerText = INFO.name;
            document.getElementById('appTagline').innerText = data.tagline;
            const imageOrder = [1, 9, 8, 10, 2, 12, 11, 4, 5, 3, 6, 13, 7];
            for (let i = 1; i <= TOTAL_CARDS; i++) {
                document.getElementById(`feat-title-${i}`).innerText = data.features[i-1].title;
                document.getElementById(`feat-desc-${i}`).innerText = data.features[i-1].desc;
                const img = document.getElementById(`shot-${i}`);
                const sk = document.getElementById(`skeleton-${i}`);
                img.style.opacity = '0'; sk.style.display = 'block';
                img.onload = () => { sk.style.display = 'none'; img.style.opacity = '1'; };
                const fileNum = imageOrder[i-1];
                img.src = `Screenshots/${INFO.versionDir}/${fLang}/${INFO.platform}/FormatRocket-${INFO.versionFile}-${fLang}-${INFO.platform}-${fileNum}.webp`;
            }
        }

        function switchLang(lang) { localStorage.setItem('moring_lang', lang); updateUI(lang); }

        window.onload = () => {
            const savedLang = localStorage.getItem('moring_lang') || navigator.language || 'en';
            let matched = 'en';
            if(savedLang.includes('zh-CN')) matched = 'zh-CN'; else if(savedLang.includes('zh')) matched = 'zh-TW';
            else if(savedLang.includes('ja')) matched = 'ja'; else if(savedLang.includes('ko')) matched = 'ko';
            else if(savedLang.includes('de')) matched = 'de'; else if(savedLang.includes('fr')) matched = 'fr';
            else if(savedLang.includes('es')) matched = 'es'; else if(savedLang.includes('it')) matched = 'it';
            else if(savedLang.includes('pt')) matched = 'pt'; else if(savedLang.includes('ru')) matched = 'ru';
            const final = INFO.langMap[matched] ? matched : 'en';
            document.getElementById('langSelector').value = final;
            updateUI(final);
            setTimeout(() => document.querySelector('section.animate-fade-in').classList.add('opacity-100'), 100);
        };
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    </script>
