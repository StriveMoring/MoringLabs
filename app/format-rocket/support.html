        .ambient-glow {
            position: absolute;

            z-index: -1;
            pointer-events: none;
        }

        .bento-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
            border-radius: 2rem;
        }

        @media (min-width: 768px) {
            .bento-card {
                border-radius: 2.5rem;
            }
        }

        .bento-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

            border-color: #374151;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.3);
        }

        /* FAQ 动画样式 */
        .faq-answer {
            display: none;
        }

        .faq-item.active .faq-answer {
            display: block;
            animation: fadeIn 0.4s ease-in-out;
        }

        .faq-item.active .fa-chevron-down {
            transform: rotate(180deg);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in-up {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;

        // 渲染核心逻辑 updateUI
        function updateUI(langCode) {
            // 回退逻辑：如果某语言数据为 null 或者 undefined，则自动转为英文。
            const safeData = translations[langCode] || translations['en'];

            // 更新静态主文本
            document.getElementById('nav-back-text').innerText = safeData.backText;
            document.getElementById('mainTitle').innerText = safeData.mainTitle;
            document.getElementById('subTitle').innerText = safeData.subTitle;
            document.getElementById('specsTitle').innerText = safeData.specsTitle;
            document.getElementById('contactTitle').innerText = safeData.contactTitle;
            document.getElementById('contactText').innerText = safeData.contactText;

                const titleColor = "text-gray-900";
                const descColor = "text-gray-500 text-sm md:text-base leading-relaxed";
                
                // 动态配置 Ultimate 卡片的高级白底设计与皇冠图标
                const isUlt = cat.id === 'plans';
                const finalIcon = isUlt ? 'crown' : cat.icon;
                const finalColor = isUlt ? 'purple' : cat.color;
                const iconWrapper = `bg-${finalColor}-50 text-${finalColor}-600 border-${finalColor}-100`;

                const premiumBadge = isUlt ? `<span class="ml-auto text-[10px] md:text-xs font-bold px-2.5 py-1 rounded-full bg-gradient-to-r from-purple-600 to-pink-500 text-white shadow-sm uppercase tracking-wider">Premium</span>` : '';

                const subtleBg = isUlt ? `<div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-purple-500/5 to-pink-500/5 rounded-bl-[100px] pointer-events-none transition-transform group-hover:scale-110 duration-500"></div>` : '';

                return `
                <a href="#${cat.id}" class="bento-card p-6 md:p-8 flex flex-col h-full block group cursor-pointer bg-white no-underline ${cardStyles}">
                    ${subtleBg}
                    <div class="flex items-center w-full mb-5 md:mb-6">

                    <h2 class="text-xl md:text-2xl font-bold mb-2 tracking-tight ${titleColor} relative z-10">${cat.title}</h2>
                    <p class="${descColor} mt-auto relative z-10">${cat.desc}</p>
                </a>`;

            // 2. 渲染下方具体的帮助分类详情区块 +手风琴互动
            const catsContainer = document.getElementById('helpCategoriesContainer');
            catsContainer.innerHTML = safeData.categories.map((cat) => {
                const itemsHtml = cat.items.map((item) => `
                    <div class="faq-item bento-card overflow-hidden cursor-pointer bg-white" onclick="this.classList.toggle('active')">
                        <div class="px-5 md:px-8 py-3 md:py-4 flex justify-between items-center font-bold text-gray-900 text-base md:text-lg">

                            <i class="fas fa-chevron-down text-gray-400 transition-transform duration-300 text-sm md:text-base flex-shrink-0"></i>

                            ${item.a}

                    </div>
                `).join('');

                const finalIcon = isUlt ? 'crown' : cat.icon;
                const finalColor = isUlt ? 'purple' : cat.color;

                <div id="${cat.id}" class="pt-24 -mt-24"> <!-- pt-24 修正锚点滚动被固定导航栏遮挡问题 -->

            // 3. 渲染底部的系统规格卡片 (Specs Grid)
            const specGrid = document.getElementById('specsGrid');
            const icons = { os: 'desktop', chip: 'microchip', limits: 'tachometer-alt', net: 'shield-alt' };
            specGrid.innerHTML = Object.entries(safeData.specs).map(([key, val]) => `
                <div class="text-center md:text-left">
                    <div class="text-gray-400 mb-1 md:mb-2 flex items-center justify-center md:justify-start text-xs md:text-sm tracking-wider font-semibold">
                        <i class="fas fa-${icons[key]} mr-1 md:mr-2 text-gray-500"></i> ${key.toUpperCase()}
                    </div>
                    <div class="font-bold text-lg md:text-xl">${val}</div>
                </div>
            `).join('');
        }

        // 语言切换与存储功能
        function switchLang(langCode) {
            localStorage.setItem('formatrocket_lang', langCode);
            updateUI(langCode);
        }

        // 页面初始化逻辑
        window.onload = function () {
            const savedLang = localStorage.getItem('formatrocket_lang') || 'en';
            // 验证语言是否有效，处理未完全翻译退回英语
            const finalLang = (translations[savedLang] && translations[savedLang] !== null) ? savedLang : 'en';

            const selector = document.getElementById('langSelector');
            if (selector.querySelector(`option[value="${finalLang}"]`)) {
                selector.value = finalLang;
            }

            // 初始化渲染界面
            updateUI(finalLang);
            // 延时加载平滑呈现动画
            setTimeout(() => document.querySelector('main.animate-fade-in').classList.add('opacity-100'), 50);
        }
    </script>
</body>

</html>
