        function updateUI(lang) {
            const data = TEXTS[lang] || TEXTS['zh-CN'];
            
            document.getElementById('hero-title').innerHTML = data.heroTitle;
            document.getElementById('hero-desc').innerText = data.heroDesc;

            document.getElementById('f1-badge').innerText = data.f1Badge;
            document.getElementById('f1-title').innerText = data.f1Title;
            document.getElementById('f1-desc').innerText = data.f1Desc;

            document.getElementById('f2-badge').innerText = data.f2Badge;
            document.getElementById('f2-title').innerText = data.f2Title;
            document.getElementById('f2-desc').innerText = data.f2Desc;
            
            document.getElementById('f3-badge').innerText = data.f3Badge;
            document.getElementById('f3-title').innerText = data.f3Title;
            document.getElementById('f3-desc').innerText = data.f3Desc;

            document.getElementById('f4-badge').innerText = data.f4Badge;
            document.getElementById('f4-title').innerText = data.f4Title;
            document.getElementById('f4-desc').innerText = data.f4Desc;

            document.getElementById('f5-badge').innerText = data.f5Badge;
            document.getElementById('f5-title').innerText = data.f5Title;
            document.getElementById('f5-desc').innerText = data.f5Desc;

            document.getElementById('qr-title').innerText = data.qrTitle;
            document.getElementById('qr-desc').innerText = data.qrDesc;

            var banner = document.getElementById('wechat-banner');
            if (banner) banner.className = (lang === 'zh-CN' || lang === 'zh-TW') ? 'mt-6 max-w-xs md:max-w-sm mx-auto rounded-xl' : 'hidden';

            document.getElementById('footer-contact').innerText = data.footerContact;
        }

        function switchLang(lang) {
            localStorage.setItem('moring_lang', lang);
            updateUI(lang);
        }

        function initLang() {
            let savedLang = localStorage.getItem('moring_lang');
            if (savedLang && TEXTS[savedLang]) {
                document.getElementById('langSelector').value = savedLang;
                updateUI(savedLang);
                return;
            }

            const browserLang = navigator.language || navigator.userLanguage;
            let finalLang = 'en';
            if (browserLang.startsWith('zh')) {
                finalLang = (browserLang.includes('CN') || browserLang.includes('Hans')) ? 'zh-CN' : 'zh-TW';
            } else if (browserLang.startsWith('ja')) finalLang = 'ja';
            else if (browserLang.startsWith('ko')) finalLang = 'ko';
            else if (browserLang.startsWith('de')) finalLang = 'de';
            else if (browserLang.startsWith('fr')) finalLang = 'fr';
            else if (browserLang.startsWith('es')) finalLang = 'es';
            else if (browserLang.startsWith('it')) finalLang = 'it';
            else if (browserLang.startsWith('pt')) finalLang = 'pt';
            else if (browserLang.startsWith('ru')) finalLang = 'ru';

            document.getElementById('langSelector').value = finalLang;
            switchLang(finalLang);
        }

        window.onload = () => {
            initLang();
            setTimeout(() => {
                document.querySelectorAll('[style*="opacity:0"]').forEach(el => {
                    el.style.opacity = '1';
                });
            }, 100);
        };
    </script>
